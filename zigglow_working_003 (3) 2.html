const FRAMES = 2226, DUR = 356.0106666666667, FPS = 6.25;

// Decode hex nibbles into Float32 streams
const S = 8; // streams per frame
const streams = Array.from({length:S}, () => new Float32Array(FRAMES));
for (let f = 0; f < FRAMES; f++) {
  for (let s = 0; s < S; s++) {
    streams[s][f] = parseInt(HEX[f*S+s], 16) / 15;
  }
}
const [amp_t, pitch, onset_t, bright, flux, amp_i, bass_i, onset_i] = streams;

// === CANVAS ===
const cv = document.getElementById('c');
const cx2d = cv.getContext('2d');
const INFO = document.getElementById('info');
const PB = document.getElementById('pb');

// Fit canvas to screen — portrait on mobile, square-ish on desktop
function resize() {
  const vw = window.innerWidth, vh = window.innerHeight;
  const ratio = 9/16;
  if (vw/vh < ratio) {
    cv.width = vw; cv.height = Math.round(vw/ratio);
  } else {
    cv.height = vh; cv.width = Math.round(vh*ratio);
  }
}
resize();
window.addEventListener('resize', resize);

const CX = () => cv.width/2;
const CY = () => cv.height/2;
const W = () => cv.width;
const H = () => cv.height;

// === CHROMA PALETTE — D major / B minor (Working 003) ===
const PC = [
  [60,180,160],[40,200,200],[220,155,40],[185,70,30],
  [215,190,50],[120,60,185],[230,165,55],[75,160,75],
  [55,95,205],[205,95,38],[180,58,82],[232,200,135]
];

// === NOISE ===
function sn(x,y,t){
  return Math.sin(x*0.021+t*0.5)*Math.cos(y*0.018-t*0.37)
        +Math.sin(x*0.041-y*0.023+t*0.82)*0.55
        +Math.cos(x*0.013+y*0.031-t*0.48)*0.38;
}

// === PARTICLES ===
const NP = 120;
const pts = Array.from({length:NP}, () => ({
  a: Math.random()*Math.PI*2,
  r: 0.05+Math.random()*0.38,
  spd: 0.003+Math.random()*0.008,
  sz: 0.003+Math.random()*0.005,
  ph: Math.random()*Math.PI*2
}));

// === BILATERAL BODY ===
function drawBody(t, amp, bright, pidx, depth) {
  const ctx = cx2d;
  const w = W(), h = H(), cx = CX(), cy = CY();
  const pc = PC[pidx];
  const fy = cy + h*0.06;
  const fs = 0.5 + amp*0.09 + bright*0.055;
  const dep = Math.max(1, Math.round(1.5 + depth*3));
  const tint = amp*0.11;
  const sr=172, sg=92, sb=52;

  const forms = [
    {x:0,      y:-0.02, rx:0.038, ry:0.060, rot:0,     bi:false},
    {x:0.052,  y:0.038, rx:0.027, ry:0.020, rot:0.2,   bi:true},
    {x:0,      y:0.088, rx:0.086, ry:0.023, rot:0,     bi:false},
    {x:0,      y:0.128, rx:0.070, ry:0.029, rot:0,     bi:false},
    {x:0.112,  y:0.018, rx:0.060, ry:0.050, rot:0.28,  bi:true},
    {x:0.066,  y:-0.078,rx:0.066, ry:0.022, rot:-0.2,  bi:true},
    {x:0.070,  y:-0.052,rx:0.035, ry:0.025, rot:0,     bi:true},
  ];

  for (let layer = dep; layer >= 0; layer--) {
    const ls = fs*(1-layer*0.14);
    const la = (0.11+(dep-layer)*0.10)*(0.5+bright*0.5);
    const ly = fy + layer*h*0.036;
    const pulse = 1+Math.sin(t*0.7+layer*0.5)*0.022*amp;
    const wv = Math.sin(t*0.4+layer)*w*0.006*amp;
    const cr=Math.min(255,sr+pc[0]*tint+Math.sin(t*0.3+layer)*7)|0;
    const cg=Math.min(255,sg+pc[1]*tint*0.5)|0;
    const cb=Math.min(255,sb+pc[2]*tint*0.3)|0;

    forms.forEach(f => {
      const drawF = (xSign) => {
        const fx = cx + f.x*w*ls*xSign + wv;
        const fy2 = ly + f.y*h*ls;
        const rx = Math.max(0.5, f.rx*w*ls*pulse);
        const ry = Math.max(0.5, f.ry*h*ls*pulse);
        ctx.save();
        ctx.translate(fx, fy2);
        ctx.rotate(f.rot*xSign);
        ctx.beginPath();
        ctx.ellipse(0,0,rx,ry,0,0,Math.PI*2);
        const g = ctx.createRadialGradient(0,0,0,0,0,Math.max(rx,ry));
        g.addColorStop(0,   `rgba(${cr+16},${cg+7},${cb},${la+0.07})`);
        g.addColorStop(0.6, `rgba(${cr},${cg},${cb},${la})`);
        g.addColorStop(1,   `rgba(${cr*.33|0},${cg*.27|0},${cb*.27|0},0)`);
        ctx.fillStyle=g; ctx.fill();
        ctx.restore();
      };
      if (!f.bi) { drawF(1); }
      else { drawF(1); drawF(-1); }
    });
  }

  // Cool orbs — appear in bright/quiet moments
  const ov = Math.max(0, bright-0.27)*1.7;
  if (ov > 0.07) {
    const or2 = Math.max(0.5, w*0.032*(0.68+bright*0.58));
    const oy = fy - h*0.051*fs;
    const ox = w*0.071*fs;
    [-ox,ox].forEach(x => {
      const g = cx2d.createRadialGradient(cx+x,oy,0,cx+x,oy,or2*2.2);
      g.addColorStop(0,  `rgba(132,175,135,${ov*0.68})`);
      g.addColorStop(0.45,`rgba(96,145,116,${ov*0.36})`);
      g.addColorStop(1,  'rgba(52,92,72,0)');
      ctx.beginPath(); ctx.arc(cx+x,oy,Math.max(0.5,or2*2.2),0,Math.PI*2);
      ctx.fillStyle=g; ctx.fill();
      ctx.beginPath(); ctx.arc(cx+x,oy,Math.max(0.5,or2),0,Math.PI*2);
      ctx.fillStyle=`rgba(155,198,158,${ov*0.46})`; ctx.fill();
    });
  }
}

// === SMOOTHING ===
const sm = Array(S).fill(0);
function getD(idx) {
  const i = Math.min(Math.max(0,idx|0), FRAMES-1);
  const k = 0.1;
  sm[0]+=(amp_t[i]-sm[0])*k;   sm[1]+=(pitch[i]-sm[1])*k;
  sm[2]+=(onset_t[i]-sm[2])*k; sm[3]+=(bright[i]-sm[3])*k;
  sm[4]+=(flux[i]-sm[4])*k;    sm[5]+=(amp_i[i]-sm[5])*k;
  sm[6]+=(bass_i[i]-sm[6])*k;  sm[7]+=(onset_i[i]-sm[7])*k;
  return {
    at:sm[0], pi:sm[1], ot:sm[2], br:sm[3],
    fl:sm[4], ai:sm[5], ba:sm[6], oi:sm[7],
    raw_ot: onset_t[i]
  };
}

// === MAIN LOOP ===
let t=0, elapsed=0, last=null;

function draw(ts) {
  if (!last) last=ts;
  const dt = Math.min((ts-last)/1000, 0.05);
  last=ts; elapsed+=dt;

  const d = getD(elapsed*FPS);
  const pidx = Math.min(11, Math.floor(d.pi*12));
  const pc = PC[pidx];
  const w=W(), h=H(), cx=CX(), cy=CY();

  // Background
  cx2d.fillStyle=`rgba(0,0,0,${0.036+d.ai*0.036})`;
  cx2d.fillRect(0,0,w,h);

  // Bass bloom
  const bR=Math.max(1, w*0.1+d.ba*w*0.32+Math.sin(t*0.62)*w*0.03);
  const bg=cx2d.createRadialGradient(cx,cy,0,cx,cy,bR*2.5);
  bg.addColorStop(0,  `rgba(${pc[0]*.37|0},${pc[1]*.27|0},${pc[2]*.46|0},${0.052+d.ba*0.07})`);
  bg.addColorStop(0.5,`rgba(${pc[0]*.17|0},${pc[1]*.13|0},${pc[2]*.21|0},${0.022+d.ba*0.032})`);
  bg.addColorStop(1,  'rgba(0,0,0,0)');
  cx2d.beginPath(); cx2d.arc(cx,cy,Math.max(1,bR*2.5),0,Math.PI*2);
  cx2d.fillStyle=bg; cx2d.fill();

  // Bilateral body
  drawBody(t, d.at, d.br, pidx, d.br*0.8+d.at*0.2);

  // Field arms
  const fR=Math.max(10, w*0.14+d.at*w*0.29+d.ba*w*0.10);
  const nA=50+(d.fl*60|0);
  for(let i=0;i<nA;i++){
    const fr=i/nA, ang=fr*Math.PI*2+t*0.14;
    const nv=sn(Math.cos(ang)*48,Math.sin(ang)*48,t*0.82);
    const r=fR*(0.27+nv*0.73+d.ai*0.27);
    const al=(0.032+d.at*0.10+nv*0.05)*(0.4+d.fl*0.6);
    cx2d.beginPath();
    cx2d.arc(cx+Math.cos(ang)*r, cy+Math.sin(ang)*r*0.71,
             Math.max(0.001,1.3+d.fl*2.6+nv*1.7),0,Math.PI*2);
    cx2d.fillStyle=`rgba(${pc[0]},${pc[1]},${pc[2]},${al})`;
    cx2d.fill();
  }

  // Particles
  pts.forEach(p=>{
    p.a+=p.spd*(0.44+d.oi*1.5);
    const pr=Math.max(5,p.r*w*(0.52+d.at*0.6+d.ba*0.36));
    const al=(0.11+d.at*0.26+d.oi*0.17)*(0.32+Math.sin(t*2+p.ph)*0.3);
    cx2d.beginPath();
    cx2d.arc(cx+Math.cos(p.a+t*0.09)*pr,
             cy+Math.sin(p.a+t*0.09)*pr*0.73,
             Math.max(0.001,p.sz*w*(0.72+d.fl*1.1)),0,Math.PI*2);
    cx2d.fillStyle=`rgba(${pc[0]},${Math.min(255,pc[1]+16)},${Math.min(255,pc[2]+7)},${al})`;
    cx2d.fill();
  });

  // Brightness bloom (the key discovery)
  if(d.br>0.27){
    const bv=(d.br-0.27)*0.37;
    const br2=Math.max(1,w*0.07+d.br*w*0.21);
    const blm=cx2d.createRadialGradient(cx,cy,0,cx,cy,br2);
    blm.addColorStop(0,  `rgba(${Math.min(255,pc[0]+40)},${Math.min(255,pc[1]+30)},${Math.min(255,pc[2]+16)},${bv})`);
    blm.addColorStop(0.5,`rgba(${Math.min(255,pc[0]+16)},${Math.min(255,pc[1]+10)},${Math.min(255,pc[2]+6)},${bv*0.35})`);
    blm.addColorStop(1,  'rgba(0,0,0,0)');
    cx2d.beginPath(); cx2d.arc(cx,cy,Math.max(1,br2),0,Math.PI*2);
    cx2d.fillStyle=blm; cx2d.fill();
  }

  // Onset flash
  if(d.raw_ot>0.65){
    const fv=(d.raw_ot-0.65)*0.52;
    const fr2=Math.max(1,w*0.022+d.raw_ot*w*0.07);
    const fg=cx2d.createRadialGradient(cx,cy,0,cx,cy,fr2);
    fg.addColorStop(0,  `rgba(255,236,192,${fv})`);
    fg.addColorStop(0.5,`rgba(${Math.min(255,pc[0]+52)},${Math.min(255,pc[1]+42)},${Math.min(255,pc[2]+22)},${fv*0.26})`);
    fg.addColorStop(1,  'rgba(0,0,0,0)');
    cx2d.beginPath(); cx2d.arc(cx,cy,Math.max(1,fr2),0,Math.PI*2);
    cx2d.fillStyle=fg; cx2d.fill();
  }

  // Spiral
  cx2d.beginPath();
  let first=true;
  for(let i=0;i<=260;i++){
    const fr=i/260, ang=fr*Math.PI*6+t*1.18;
    const nv=sn(Math.cos(ang*0.42)*42,Math.sin(ang*0.38)*42,t*1.1)*17;
    const r2=Math.max(0.1,w*0.015+Math.sin(t*0.68)*w*0.013+d.ba*w*0.033+nv*(0.46+d.br*0.5)+fr*w*0.16*(0.56+d.at*0.56));
    const px=cx+Math.cos(ang)*r2, py=cy+Math.sin(ang)*r2*0.71;
    first?(cx2d.moveTo(px,py),first=false):cx2d.lineTo(px,py);
  }
  cx2d.strokeStyle=`rgba(${pc[0]+26},${pc[1]+16},${pc[2]},${0.065+d.at*0.065})`;
  cx2d.lineWidth=1.2; cx2d.stroke();

  // Core
  const cR=Math.max(0.1,w*0.005+Math.sin(t*2.7)*w*0.003+d.at*w*0.013);
  const cg=cx2d.createRadialGradient(cx,cy,0,cx,cy,cR+w*0.026);
  cg.addColorStop(0,  `rgba(255,230,170,${0.66+d.ot*0.34})`);
  cg.addColorStop(0.4,`rgba(${Math.min(255,pc[0]+36)},${Math.min(255,pc[1]+26)},${pc[2]},${0.26})`);
  cg.addColorStop(1,  'rgba(0,0,0,0)');
  cx2d.beginPath(); cx2d.arc(cx,cy,Math.max(0.5,cR+w*0.026),0,Math.PI*2);
  cx2d.fillStyle=cg; cx2d.fill();
  cx2d.beginPath(); cx2d.arc(cx,cy,Math.max(0.1,cR),0,Math.PI*2);
  cx2d.fillStyle=`rgba(255,233,175,${0.7+Math.sin(t*3)*0.3})`; cx2d.fill();

  // Progress + loop
  PB.style.width=(Math.min(elapsed/DUR,1)*100)+'%';
  if(elapsed>=DUR){elapsed=0; sm.fill(0);}
  if(elapsed>5) INFO.classList.add('fade');

  t+=0.016;
  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
</script>
