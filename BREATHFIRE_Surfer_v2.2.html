<script>
/* =====================================================================
   ZIGVERSE ENGINE — BodyInMedium archetype
   ---------------------------------------------------------------------
   The athlete is ONE node. The medium does the figuring.
   Figure implied, never depicted. The medium remembering impact
   is the subject.

   Layer wiring (consistent with ZigCore):
     Life Force  -> BreathSource + ZigBreath (asymmetric lag)
     Behavior    -> ZigBehavior (observe..rest state machine)
     Environment -> Medium (abstract) -> WaterMedium (concrete)
     Morphology  -> MediumNode (center of gravity) + Signature (plume)
     Memory      -> Wake (impact memory, lives inside Medium)

   A SPECIMEN (a sport) = a specimen config + a Medium subclass.
   The node and the state machine are inherited unchanged.
   ===================================================================== */


/* ====================== LIFE FORCE ================================= */

// Interface: a source of biological telemetry. getBreath(t) -> [0,1].
class BreathSource {
  getBreath(_t){ return 0; }
}

// Plays back recorded CC2 events: [{t: seconds, value: 0..127}, ...]
// This is the real-performance path (e.g. the San Onofre surfer take).
class RecordedBreath extends BreathSource {
  constructor(events){ super(); this.e = events || []; this.i = 0; }
  getBreath(t){
    const e = this.e;
    if (e.length === 0) return 0;
    // --- BUG FIX (carried from Crystal Root Network): never extrapolate
    // backwards before the first CC2 event. Early-return 0, clamp [0,1]. ---
    if (t <= e[0].t) return 0;
    if (t >= e[e.length-1].t) return clamp01(e[e.length-1].value/127);
    // bracket + linear interpolate
    let lo = 0, hi = e.length-1;
    while (hi - lo > 1){ const m=(lo+hi)>>1; (e[m].t<=t)?lo=m:hi=m; }
    const a=e[lo], b=e[hi];
    const f=(t-a.t)/Math.max(1e-6,(b.t-a.t));
    return clamp01(((a.value + (b.value-a.value)*f)/127));
  }
}

// Synthetic point-break breath: continuous engagement (San Onofre never
// gives you wait-wait-drop), with periodic convergence surges. Used so the
// archetype runs with no MIDI loaded. Swap for RecordedBreath to go live.
class SyntheticBreath extends BreathSource {
  getBreath(t){
    if (t < 2) return 0;                       // pre-roll, exercises the clamp
    const base = 0.17 + 0.11*Math.sin(t*0.22); // continuous trim engagement
    const phase = t % 26;                      // a wave every ~26s
    let surge = 0;
    if (phase > 8 && phase < 17){
      const l = (phase-8)/9;                    // 0..1 across the ride
      surge = Math.pow(Math.sin(l*Math.PI), 1.4) * 0.72;
    }
    return clamp01(base + surge);
  }
}

// ZigBreath: asymmetric lag filter. Breath fills faster than it empties,
// like lungs and like water loading under a rider. Tracks velocity so the
// behavior machine can read intention (rising) vs release (falling).
class ZigBreath {
  constructor(source, riseTau=0.18, fallTau=0.9){
    this.src=source; this.rise=riseTau; this.fall=fallTau;
    this.value=0; this.prev=0; this.vel=0;
  }
  update(t, dt){
    const raw = this.src.getBreath(t);
    const tau = raw > this.value ? this.rise : this.fall;
    const k = 1 - Math.exp(-dt/tau);
    this.prev = this.value;
    this.value += (raw - this.value)*k;
    this.vel = (this.value - this.prev)/Math.max(1e-4,dt);  // per second
  }
}


/* ====================== DATA PIPELINE (reusable across all species) ===
   Ingests a witnessed performance: a MIDI take (CC2 breath, pitch bend,
   note onsets) and an optional zigdna_audio.json (amplitude, brightness,
   chroma, onset). Every Zigverse organism loads its life this same way.
   ===================================================================== */

const BEND_GAIN = 4.0;                          // amplify expressive pitch work (soft-clipped via tanh)
function chromaHue(base){ return base + (TEL.chroma-0.5)*42; }  // chroma wheel nudge

// Standard MIDI File parser — no libraries, runs offline from file://

      let b=v.getUint8(p.i);

      const cmd=status&0xf0;
      if(status===0xff){ const meta=v.getUint8(p.i++), l=readVLQ(v,p);
        if(meta===0x51) ev.push({tick,kind:'tempo',a:(v.getUint8(p.i)<<16)|(v.getUint8(p.i+1)<<8)|v.getUint8(p.i+2)});
        p.i+=l;
      }
      else if(status===0xf0||status===0xf7){ p.i+=readVLQ(v,p); }
      else if(cmd===0xb0){ const cc=v.getUint8(p.i++), val=v.getUint8(p.i++); if(cc===2) ev.push({tick,kind:'cc2',a:val}); }
      else if(cmd===0xe0){ const lsb=v.getUint8(p.i++), msb=v.getUint8(p.i++); ev.push({tick,kind:'bend',a:(msb<<7)|lsb}); }
      else if(cmd===0x90){ const n=v.getUint8(p.i++), vel=v.getUint8(p.i++); if(vel>0) ev.push({tick,kind:'note',a:n}); }
      else if(cmd===0x80||cmd===0xa0){ p.i+=2; }
      else if(cmd===0xc0||cmd===0xd0){ p.i+=1; }
      else { p.i+=2; }
    }
    pos=end;
  }
  ev.sort((x,y)=>x.tick-y.tick);
  let tempo=500000, lastTick=0, sec=0;        // ticks -> seconds via tempo map
  const cc2=[], bend=[], notes=[];
  for(const e of ev){
    sec += (e.tick-lastTick)*(tempo/1e6)/division; lastTick=e.tick;
    if(e.kind==='tempo') tempo=e.a;
    else if(e.kind==='cc2') cc2.push({t:sec, value:e.a});
    else if(e.kind==='bend') bend.push({t:sec, value:(e.a-8192)/8192});
    else if(e.kind==='note') notes.push({t:sec});
  }
  return { cc2, bend, notes, duration:sec };
}

// pitch bend as emotion/tension [-1,1] — same pre-first-event clamp as breath
class BendStream {
  constructor(e){ this.e=e||[]; }
  get(t){ const e=this.e; if(!e.length) return 0;
    if(t<=e[0].t) return 0; if(t>=e[e.length-1].t) return e[e.length-1].value;
    let lo=0,hi=e.length-1; while(hi-lo>1){const m=(lo+hi)>>1;(e[m].t<=t)?lo=m:hi=m;}
    const a=e[lo],b=e[hi],f=(t-a.t)/Math.max(1e-6,b.t-a.t); return a.value+(b.value-a.value)*f; }
}

// note onsets -> decaying per-frame pulse (activity / impact events)
class OnsetStream {
  constructor(n){ this.e=n||[]; this.last=0; }
  pulse(t, dt){ let hit=0; for(const n of this.e){ if(n.t>t-dt && n.t<=t){ hit=1; break; } }
    this.last=Math.max(hit, this.last*Math.exp(-dt/0.18)); return this.last; }
}

// zigdna_audio.json streams — tolerant to schema, aliases common key names
class AudioStreams {
  constructor(json){
    this.ok=false; if(!json) return;
    const pick=(...ks)=>{ for(const k of ks){ if(Array.isArray(json[k])) return json[k];
      if(json.streams && Array.isArray(json.streams[k])) return json.streams[k]; } return null; };
    let amp=pick('amplitude','rms','amp','energy'),
        bright=pick('brightness','spectral_centroid','centroid','spectral_brightness'),
        chroma=pick('chroma','hue','chroma_hue','pitch_class'),
        onset=pick('onset','onsets','onset_env','onset_strength');
    if(!(amp||bright||chroma||onset)) return;
    this.times=Array.isArray(json.times)?json.times:null;
    const len=(amp||bright||chroma||onset).length;
    this.duration=json.duration || (this.times?this.times[this.times.length-1]:len/(json.fps||30));
    const norm=s=>{ if(!s) return null; let mn=Infinity,mx=-Infinity;
      for(const x of s){ if(x<mn)mn=x; if(x>mx)mx=x; } const r=(mx-mn)||1; return s.map(x=>(x-mn)/r); };
    this.amp=norm(amp); this.bright=norm(bright); this.chroma=norm(chroma); this.onset=norm(onset);
    this.ok=true;
  }
  _at(s,t){ if(!s) return 0.5; const n=s.length; let idx;
    if(this.times){ let lo=0,hi=this.times.length-1; while(hi-lo>1){const m=(lo+hi)>>1;(this.times[m]<=t)?lo=m:hi=m;} idx=lo; }
    else idx=Math.floor((t/this.duration)*n);
    return s[Math.max(0,Math.min(n-1,idx))]; }
  sample(t){ return { amp:this._at(this.amp,t), bright:this._at(this.bright,t),
    chroma:this._at(this.chroma,t), onset:this._at(this.onset,t) }; }
}


/* ====================== BEHAVIOR =================================== */

// Universal six-state agent arc. Trim State = observe. Convergence = execute.
// Driven purely by breath value + velocity, with hysteresis so it doesn't flicker.
const STATES = {
  rest:     { sheet:"signature at rest" },
  observe:  { sheet:"TRIM STATE · gliding" },
  mobilise: { sheet:"line gathering energy" },
  commit:   { sheet:"weight moving into the wave" },
  execute:  { sheet:"CONVERGENCE MOMENT · the mark revealed" },
  release:  { sheet:"wake fading, returning to glide" },
};
class ZigBehavior {
  constructor(){ this.state="rest"; this.dwell=0; }
  update(breath, dt){
    const b = breath.value, v = breath.vel;
    this.dwell += dt;
    const go = (s)=>{ if(this.state!==s){ this.state=s; this.dwell=0; } };
    // priority high->low; thresholds chosen for clean Trim/Convergence read
    if (b >= 0.74)                       go("execute");
    else if (b >= 0.48 && v > 0.02)      go("commit");
    else if (v > 0.06 && b < 0.5)        go("mobilise");
    else if (v < -0.04 && b > 0.2)       go("release");
    else if (b >= 0.13)                  go("observe");
    else if (this.dwell > 0.6)           go("rest");
    return this.state;
  }
}


/* ====================== ENVIRONMENT (abstract) ===================== */

// A reactive field the node moves through. Holds the ambient structure
// (swell), the impact memory (wake), and the response (spray).
//
// === EXTENSION SEAM ===
// Subclass this for every new medium: AirMedium (ski jump, vault),
// SnowMedium, DualMedium (diver: air then water). The node never changes.
class Medium {
  constructor(spec){
    this.spec = spec;
    this.wake = [];      // impact memory — the subject
    this.spray = [];     // momentary response particles
    this.t = 0;
    this.scroll = 0;     // forward travel through the medium (px)
    this.scrollDelta = 0;// this frame's advance — streams the wake backward
    this.riderX = 0;     // the dominant feature forms around the rider
    this.W = 1280; this.H = 720;
  }
  // how the medium carries the node vertically at a given x (the swell)
  surfaceY(x, h){ return h*0.5; }
  // node deposits its passage into memory; intensity = commitment (breath)
  receiveImpact(x, y, intensity){
    this.wake.push({x, y, life:1, born:intensity});
    if (this.wake.length > 320) this.wake.shift();
  }
  emitSpray(x, y, intensity){
    const n = Math.floor(intensity*6);
    for(let i=0;i<n;i++){
      this.spray.push({
        x, y,
        vx:(Math.random()-0.5)*2.2,
        vy:-Math.random()*2.2 - intensity*1.5,
        life:1
      });
    }
  }
  update(dt, persistence){
    // forward travel streams the impact memory backward behind the rider
    for(const w of this.wake){ w.life *= persistence; w.x -= this.scrollDelta; }
    this.wake = this.wake.filter(w=>w.life>0.04 && w.x>-80);
    for(const s of this.spray){
      s.x+=s.vx - this.scrollDelta; s.y+=s.vy; s.vy+=0.08; s.life-=dt*0.7;
    }
    this.spray = this.spray.filter(s=>s.life>0 && s.x>-40);
    this.t += dt;
  }
  renderField(_ctx,_w,_h,_breath){}
  renderWave(_ctx,_breath){}   // dominant feature (crest, jump lip, surface) — subclass draws it
  renderWake(_ctx){}
}

// Concrete water medium for the Surfer specimen.
class WaterMedium extends Medium {
  constructor(spec){ super(spec); this.foam=[]; this.energy=0; this.waveEnergy=0; }
  // billowy breaking foam: emitted at the lip, tumbles down the face, drifts into whitewater
  stepFoam(dt){
    const W=this.W, H=this.H;
    this.waveEnergy += (this.energy - this.waveEnergy)*0.04;   // wave builds/relaxes slowly
    const peakX=this.riderX - W*0.16;
    const rate = 8 + this.energy*22;
    for(let i=0;i<rate;i++){
      const back = Math.pow(Math.random(),1.5)*W*0.55;     // densest at the curl, trails far left
      const lf = Math.min(back/(W*0.55), 1);                // 0 at the break -> 1 far down the line
      const x = peakX + W*0.03 - back + (Math.random()-0.5)*14;
      const y = this.crestY(x) - Math.random()*H*0.03*(0.4+lf);   // cap rises above crest, taller to the left
      this.foam.push({ x, y,
        vx: -(0.15+lf*0.8+Math.abs(TEL.bend)*0.7)*Math.random(),  // folds inward (shoreward); bend throws it harder
        vy: (0.25+lf*0.8)*Math.random()+0.2,                // cascades down the face
        r: (5+Math.random()*13)*(1+lf*0.9),                 // crest grows bigger the further left
        life:1, max:0.8+Math.random()*1.1, seed:Math.random()*6.28 });
    }
    for(const p of this.foam){
      p.x += p.vx - this.scrollDelta;
      p.vy += 0.04; p.y += p.vy;
      const surf=this.crestY(p.x);
      if(p.y < surf) p.y += (surf-p.y)*0.05;   // cascade down the folding face
      p.r += dt*7;
      p.life -= dt/p.max;
    }
    this.foam = this.foam.filter(p=>p.life>0 && p.x>-80);
    if(this.foam.length>420) this.foam.splice(0, this.foam.length-420);
  }
  update(dt, persistence){ super.update(dt, persistence); this.stepFoam(dt); }
  // The breaking-wave face. Rises to a curling crest just behind the rider and
  // peels away behind. The rider rides the steep open face, under the lip.
  crestY(x){
    const h=this.H, W=this.W, s=this.spec.swell;
    const peakX  = this.riderX - W*0.16;      // break sits just behind the rider
    const trough = h*0.66;
    const baseH  = h*(0.20 + this.waveEnergy*0.12);   // builds as the rider commits
    const d = x - peakX;
    let grow;
    if(d>0) grow = Math.exp(-(d*d)/(2*(W*0.20)*(W*0.20)));         // open face descends ahead (right)
    else { const L=Math.min(-d/(W*0.55),1); grow = 1 + L*0.95; }  // crest GROWS the further left (shoaling)
    const ripple= Math.sin((x+this.scroll)*s.k*1.4 + this.t*s.speed)*(3+grow*6);
    return Math.max(h*0.05, trough - grow*baseH + ripple);
  }
  // the rider reads the wave face here; node.update tucks it into the pocket
  surfaceY(x, h){ return this.crestY(x); }
  renderField(ctx, w, h, breath){
    // swell lines stream past with parallax; more pronounced at convergence
    const s = this.spec.swell;
    const layers = 7;
    for(let L=0; L<layers; L++){
      const depth = L/(layers-1);
      const amp = s.amp*(0.4+depth*1.1)*(0.7+breath*0.6);
      const yBase = h*0.42 + depth*h*0.5;
      const par = this.scroll*(0.3+depth*0.9);     // near layers stream faster
      const drift = this.t*s.speed*(0.3+depth*0.4); // residual independent swell
      ctx.beginPath();
      for(let x=-20;x<=w+20;x+=14){
        const y = yBase + Math.sin((x+par)*s.k*(0.7+depth*0.4)+drift)*amp;
        x===-20?ctx.moveTo(x,y):ctx.lineTo(x,y);
      }
      const a = (0.05+depth*0.10)*(0.6+breath*0.7);
      ctx.strokeStyle = `hsla(205,90%,${40+depth*22}%,${a})`;
      ctx.lineWidth = 1+depth*1.4;
      ctx.stroke();
    }
  }
  // === breaking wave: water wall + peeling lip that crests over behind the rider ===
  renderWave(ctx, breath){
    const h=this.H, W=this.W;
    const peakX = this.riderX - W*0.18;
    const crestPeakY = this.crestY(peakX);
    ctx.globalCompositeOperation='lighter';
    // the water wall: filled under the crest, brightest near the lip
    ctx.beginPath();
    ctx.moveTo(-20, h+20);
    for(let x=-20;x<=W+20;x+=10) ctx.lineTo(x, this.crestY(x));
    ctx.lineTo(W+20, h+20); ctx.closePath();
    const g = ctx.createLinearGradient(0, crestPeakY, 0, h);
    g.addColorStop(0,   `hsla(188,100%,60%,${0.12+breath*0.12})`);
    g.addColorStop(0.4, 'hsla(208,95%,45%,0.05)');
    g.addColorStop(1,   'hsla(220,90%,30%,0)');
    ctx.fillStyle=g; ctx.fill();
    // breaking foam: a billowy mass of soft overlapping puffs, churning + cascading
    for(const p of this.foam){
      const churn = 0.82 + 0.18*Math.sin(this.t*3 + p.seed);
      const r = p.r*churn;
      const a = p.life*p.life*0.09*churn*(0.7+breath*0.5);
      const gr=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,r);
      gr.addColorStop(0,`hsla(${chromaHue(192)},55%,97%,${a})`);
      gr.addColorStop(0.6,`hsla(${chromaHue(196)},70%,88%,${a*0.5})`);
      gr.addColorStop(1,`hsla(${chromaHue(202)},80%,80%,0)`);
      ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2); ctx.fill();
    }
    ctx.globalCompositeOperation='source-over';
  }
  renderWake(ctx){
    ctx.globalCompositeOperation='lighter';
    for(const w of this.wake){
      const r = 2 + w.born*7*w.life;
      const a = w.life*w.life*(0.25+w.born*0.5);
      const g = ctx.createRadialGradient(w.x,w.y,0,w.x,w.y,r);
      g.addColorStop(0,`hsla(170,100%,80%,${a})`);
      g.addColorStop(1,`hsla(190,100%,55%,0)`);
      ctx.fillStyle=g;
      ctx.beginPath(); ctx.arc(w.x,w.y,r,0,Math.PI*2); ctx.fill();
    }
    for(const s of this.spray){
      ctx.fillStyle=`hsla(180,100%,85%,${s.life*0.8})`;
      ctx.fillRect(s.x, s.y, 1.6, 1.6);
    }
    ctx.globalCompositeOperation='source-over';
  }
}


/* ====================== MORPHOLOGY ================================= */

// The center of gravity. The athlete. Never a body — a node + its signature.
class MediumNode {
  constructor(spec){
    this.spec=spec;
    this.x=0; this.y=0; this.glide=spec.glide;
    this.bright=0;
  }
  update(medium, breath, state, w, h, dt){
    // The rider holds frame; the wave streams past = forward travel, no looping.
    // Forward speed scales with commitment (drives harder at convergence).
    const fwd = 55 + breath.value*190 + TEL.amp*45;   // amplitude adds drive
    medium.scrollDelta = fwd*dt;
    medium.scroll += medium.scrollDelta;
    // hold a stable screen position with a gentle trimming sway along the line
    this.x = w*0.60 + Math.sin(medium.scroll*0.0035)*w*0.03;
    medium.riderX = this.x;                       // the wave forms around the rider
    medium.energy = breath.value;                 // foam breaks harder with breath
    const surf = medium.surfaceY(this.x, h);
    // ride the pocket, just under the curling lip; tuck higher/tighter at convergence
    const pocket = (state==="execute") ? 34 : (state==="commit"? 50 : 66);
    const carve  = -TEL.bend * h*0.05;            // pitch bend carves up/down the face
    const target = surf + pocket + carve;
    this.y += (target - this.y) * (1 - Math.exp(-dt/0.25));
    this.bright += (breath.value - this.bright)*(1-Math.exp(-dt/0.3));
    // deposit memory + spray scaled by commitment; the medium streams it backward
    medium.receiveImpact(this.x, this.y, this.bright);
    if (state==="commit" || state==="execute") medium.emitSpray(this.x,this.y,this.bright);
    if (TEL.onset>0.55) medium.emitSpray(this.x,this.y,this.bright*TEL.onset);  // onsets throw spray
    if (Math.abs(TEL.bend)>0.5) medium.emitSpray(this.x,this.y,this.bright*Math.abs(TEL.bend));  // hard carves throw spray
  }
  render(ctx){
    const r = 10 + this.bright*26;
    const hue = chromaHue(158);                 // chroma stream colors the node
    ctx.globalCompositeOperation='lighter';
    // outer bloom
    let g = ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,r*3.2);
    g.addColorStop(0,`hsla(${hue},100%,75%,${0.5+this.bright*0.4})`);
    g.addColorStop(0.4,`hsla(${hue+24},100%,60%,${0.15+this.bright*0.2})`);
    g.addColorStop(1,`hsla(${hue+44},100%,50%,0)`);
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(this.x,this.y,r*3.2,0,Math.PI*2); ctx.fill();
    // hot core
    g = ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,r);
    g.addColorStop(0,'rgba(240,255,255,0.95)');
    g.addColorStop(0.5,`hsla(${hue},100%,80%,0.7)`);
    g.addColorStop(1,`hsla(${hue+18},100%,60%,0)`);
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(this.x,this.y,r,0,Math.PI*2); ctx.fill();
    ctx.globalCompositeOperation='source-over';
  }
}

// The signature — the surfer's hair. Flowing strands swept up-and-back against
// travel, rippling like hair in wind. Almost invisible at rest; a full lifted
// mane at convergence — the character's mark revealed.
class Signature {
  constructor(spec){ this.spec=spec; this.phase=0; }
  render(ctx, node, breath, dt){
    this.phase += dt*1.7;
    const b = breath.value;
    const baseLen = 26 + b*120;
    const strands = 9, segs = 12;
    const sweep = 0.45 + b*0.75 + Math.abs(TEL.bend)*0.5;   // bend tension (magnitude) lays it back
    ctx.globalCompositeOperation='lighter';
    for(let s=0;s<strands;s++){
      const u = s/(strands-1);                          // 0..1 across the head
      const rootX = node.x + (u-0.5)*15;
      const rootY = node.y - node.bright*6 - 3;
      const sLen = baseLen*(0.5 + 0.5*Math.sin(u*Math.PI)); // fuller in the middle
      const strandPhase = this.phase + s*0.65;
      let prevX=rootX, prevY=rootY;
      for(let i=1;i<=segs;i++){
        const f=i/segs;                                 // along the strand
        const up   = sLen*f;                            // rises from the head
        const back = sLen*0.95*Math.pow(f,1.5)*sweep;   // lays back against travel
        const sway = Math.sin(strandPhase + f*3.4)*(2.2 + b*9 + TEL.onset*12 + Math.abs(TEL.bend)*11)*f; // wind + onset + bend whip
        const x = rootX - back + sway;
        const y = rootY - up;
        const a = (0.05 + b*b*0.85)*(1 - f*0.45);       // taper + breath gate
        ctx.beginPath();
        ctx.moveTo(prevX,prevY); ctx.lineTo(x,y);
        ctx.strokeStyle = `hsla(${172+u*16},100%,${88-f*16}%,${a})`;
        ctx.lineWidth = 2.4 - f*1.9;
        ctx.lineCap = 'round';
        ctx.stroke();
        prevX=x; prevY=y;
      }
    }
    ctx.globalCompositeOperation='source-over';
  }
}


/* ====================== THE ARCHETYPE ============================== */

class BodyInMedium {
  constructor(specimen){
    this.spec = specimen;
    this.breath   = new ZigBreath(specimen.source);
    this.behavior = new ZigBehavior();
    this.medium   = specimen.makeMedium();   // EXTENSION SEAM
    this.node     = new MediumNode(specimen);
    this.signature= new Signature(specimen);
    this.state="rest";
  }
  update(t, dt, w, h){
    this.medium.W = w; this.medium.H = h;   // the wave is sized to the viewport
    this.breath.update(t, dt);
    this.state = this.behavior.update(this.breath, dt);
    // node advances the world scroll first, then the medium ages + streams the wake
    this.node.update(this.medium, this.breath, this.state, w, h, dt);
    this.medium.update(dt, this.spec.wakePersistence);
  }
  render(ctx, w, h, dt){
    this.medium.renderField(ctx, w, h, this.breath.value);   // distant ocean
    this.medium.renderWave(ctx, this.breath.value);          // breaking crest + lip
    this.medium.renderWake(ctx);                             // rider's path memory
    this.signature.render(ctx, this.node, this.breath, dt);
    this.node.render(ctx);
  }
}

    perf.duration=m.duration; perf.loaded=true;
    if(auto) organism.breath.src=perf.breath;
    note.textContent=`MIDI loaded — ${m.cc2.length} CC2 breath · ${m.bend.length} bend · ${m.notes.length} onsets · ${m.duration.toFixed(1)}s`;
  }catch(err){ note.textContent='That file is not a MIDI take: '+err.message; }
  setStatus();
}
async function loadJSON(f){
  try{
    perf.audio=new AudioStreams(JSON.parse(await f.text()));
    if(!perf.duration && perf.audio.duration) perf.duration=perf.audio.duration;
    note.textContent = perf.audio.ok
      ? 'Audio streams bound: '+['amp','bright','chroma','onset'].filter((k,i)=>[perf.audio.amp,perf.audio.bright,perf.audio.chroma,perf.audio.onset][i]).join(', ')
      : 'JSON loaded but no streams matched the expected keys — send me the schema and I will map it exactly.';
  }catch(err){ note.textContent='JSON parse error'; }
  setStatus();
}
function loadSound(f){
  audioEl.src=URL.createObjectURL(f); audioActive=true; audioEl.play().catch(()=>{});
  note.textContent='Sound loaded — it is now the master clock, visuals locked to audio.';
  setStatus();
}
function routeFile(f){
  const n=(f.name||'').toLowerCase();
  if(n.endsWith('.mid')||n.endsWith('.midi')) loadMIDI(f);
  else if(n.endsWith('.json')) loadJSON(f);
  else if((f.type||'').startsWith('audio/') || /\.(wav|mp3|m4a|aif|aiff|flac|ogg)$/.test(n)) loadSound(f);
  else note.textContent='Unrecognized file — drop a .mid take, a .json analysis, or an audio file.';
}

// buttons open the OS file browser; drag-and-drop is the easier path
document.getElementById('midiBtn').onclick=()=>{ note.textContent='Choose your Surfing .mid export in the file browser…'; document.getElementById('midiFile').click(); };
document.getElementById('midiFile').onchange=e=>{ if(e.target.files[0]) loadMIDI(e.target.files[0]); };
document.getElementById('jsonBtn').onclick=()=>{ note.textContent='Choose your zigdna_audio.json in the file browser…'; document.getElementById('jsonFile').click(); };
document.getElementById('jsonFile').onchange=e=>{ if(e.target.files[0]) loadJSON(e.target.files[0]); };
document.getElementById('soundBtn').onclick=()=>{ note.textContent='Choose the audio file in the file browser…'; document.getElementById('soundFile').click(); };
document.getElementById('soundFile').onchange=e=>{ if(e.target.files[0]) loadSound(e.target.files[0]); };

// drag a file anywhere onto the organism
window.addEventListener('dragover', e=>{ e.preventDefault(); document.body.style.boxShadow='inset 0 0 0 3px rgba(120,220,255,.55)'; });
window.addEventListener('dragleave',e=>{ document.body.style.boxShadow='none'; });
window.addEventListener('drop', e=>{ e.preventDefault(); document.body.style.boxShadow='none';
  for(const f of e.dataTransfer.files) routeFile(f); });

// --- auto-load an embedded performance if one is baked into this file ---
function startSound(){ if(audioEl.src && !audioActive){ audioActive=true; audioEl.currentTime=clock%(perf.duration||1e9); audioEl.play().catch(()=>{}); setStatus(); note.textContent=''; } }
if(window.ZIG_TAKE){
  const T=window.ZIG_TAKE;
  if(T.midi){
    perf.breath=new RecordedBreath(T.midi.cc2.map(a=>({t:a[0],value:a[1]})));
    perf.bend  =new BendStream(T.midi.bend.map(a=>({t:a[0],value:a[1]})));
    perf.onset =new OnsetStream(T.midi.notes.map(t=>({t})));
    perf.duration=T.midi.duration; perf.loaded=true;
    if(auto) organism.breath.src=perf.breath;
  }
  if(T.audio){ perf.audio=new AudioStreams(T.audio); if(!perf.duration && perf.audio.duration) perf.duration=perf.audio.duration; }
  if(T.mp3){ audioEl.src=T.mp3; window.addEventListener('pointerdown', startSound); window.addEventListener('keydown', startSound); }
  // baked-in take: hide the dev controls, leave a clean frame (press H for the readout)
  document.querySelector('.ctl').style.display='none';
  const hud=document.querySelector('.hud'); hud.style.display='none';
  window.addEventListener('keydown', e=>{ if(e.key==='h'||e.key==='H') hud.style.display = hud.style.display==='none'?'block':'none'; });
  note.textContent = (T.name||'Embedded take')+(T.mp3?' — tap anywhere to start the sound, locked to the visuals.':'');
}

let last=performance.now()/1000, clock=0;
function frame(){
  const now=performance.now()/1000;
  const dt=Math.min(0.05, now-last); last=now;

  // master clock: the sound if it's playing, else internal time
  if(audioActive && !audioEl.paused) clock=audioEl.currentTime; else clock+=dt;
  const pt = (perf.loaded && perf.duration>0 && !audioActive) ? (clock % perf.duration) : clock;

  // sample telemetry from the real take and feed the shared bus
  TEL.bend  = perf.bend ? Math.tanh(perf.bend.get(pt)*BEND_GAIN) : 0;
  let onset = perf.onset ? perf.onset.pulse(pt, dt) : 0;
  if(perf.audio && perf.audio.ok){
    const s=perf.audio.sample(pt);
    TEL.amp=s.amp; TEL.bright=s.bright; TEL.chroma=s.chroma; onset=Math.max(onset,s.onset);
  }
  TEL.onset=onset;

  organism.breath.src = auto ? perf.breath : manualSource;

  // persistence fade — the field itself remembering, cheap glow trails
  ctx.fillStyle='rgba(2,4,10,0.16)';
  ctx.fillRect(0,0,W,H);

  organism.update(pt, dt, W, H);   // pt aligns recorded breath/bend/audio to the timeline
  organism.render(ctx, W, H, dt);

  stateEl.textContent = organism.state.toUpperCase();
  sheetEl.textContent = STATES[organism.state].sheet;
  barEl.style.width = (organism.breath.value*100).toFixed(0)+'%';

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
