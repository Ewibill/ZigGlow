// ── COLOR TEMPERATURE — emotional palette ──
function wCol(intensity=1){
  const t=colorTemp;
  let r,g,b;
  if(t<0.30){const p=t/0.30;r=lerp(18,8,p);g=lerp(22,148,p);b=lerp(78,168,p);}
  else if(t<0.62){const p=(t-0.30)/0.32;r=lerp(8,18,p);g=lerp(148,198,p);b=lerp(168,188,p);}
  else if(t<0.88){const p=(t-0.62)/0.26;r=lerp(18,80,p);g=lerp(198,230,p);b=lerp(188,218,p);}
  else{const p=(t-0.88)/0.12;r=lerp(80,232,p);g=lerp(230,250,p);b=lerp(218,255,p);}
  return`rgba(${Math.round(r)},${Math.round(g)},${Math.round(b)},${intensity})`;
}

// ══════════════════════════════════════════════════════════════
//  WAVE GEOMETRY — four layers at four speeds
// ══════════════════════════════════════════════════════════════
// Layer 1: Deep body drift — tectonic/oceanic mass (very slow)
// Layer 2: Mid-current flow — rolling energy (medium)
// Layer 3: Surface ripple — realism (fast)
// Layer 4: Lip/crest — calligraphic intelligence (reactive)

function waveBase(px,layer=2){
  const nx=px/W;
  // Concave arc — real wave face curves toward viewer
  const curve=H*0.052*Math.sin(nx*Math.PI*0.90);
  // Diagonal rise left→right (surfer rides this angle)
  const diag=-H*0.33*nx;
  // Base height varies per layer — creates parallax depth
  const base=H*(0.36+layer*0.008);
  return base+diag-curve;
}

function waveDeep(px){ // Layer 1: massive slow body
  const nx=px/W;
  return waveBase(px,0)
    +Math.sin(nx*Math.PI*1.2+phaseDeep)*H*0.045
    +Math.sin(nx*Math.PI*2.1+phaseDeep*0.7)*H*0.018
    +noise(px*0.002,phaseDeep*8,80)*H*0.022;
}
function waveMid(px){ // Layer 2: rolling energy
  const nx=px/W;
  return waveBase(px,1)
    +Math.sin(nx*Math.PI*1.6+phaseMid)*H*0.038
    +Math.sin(nx*Math.PI*3.4+phaseMid*1.2)*H*0.014
    +Math.sin(nx*Math.PI*5.8+phaseMid*0.8)*H*0.008
    +noise(px*0.003,phaseMid*10,60)*H*0.014;
}
function waveSurf(px){ // Layer 3: surface ripple
  const nx=px/W;
  return waveBase(px,2)
    +Math.sin(nx*Math.PI*1.8+phaseSurf)*H*0.032
    +Math.sin(nx*Math.PI*4.2+phaseSurf*1.4)*H*0.012
    +Math.sin(nx*Math.PI*7.6+phaseSurf*0.9)*H*0.006
    +noise(px*0.004,phaseSurf*12,45)*H*0.010;
}
function waveLip(px){ // Layer 4: lip — reactive to breath+tension
  const nx=px/W;
  // Lip breathes with the organism — tightens before bloom
  const tighten=tensionAmt*H*0.012*(1-Math.abs(nx-0.5)*1.8);
  return waveBase(px,3)
    +Math.sin(nx*Math.PI*2.0+phaseRipple)*H*(0.028+breath*0.008)
    +Math.sin(nx*Math.PI*5.2+phaseRipple*1.5)*H*0.008
    +Math.sin(nx*Math.PI*9.4+phaseRipple*2.1)*H*0.004
    -tighten // lip rises (tightens) under tension
    +noise(px*0.005,phaseRipple*15,35)*H*(0.006+tensionAmt*0.006);
}

// ══════════════════════════════════════════════════════════════
//  DRAW: DEEP OCEAN BODY — this water has weight
// ══════════════════════════════════════════════════════════════
function drawDeepBody(){
  // Fill from deep wave top to bottom of frame
  // Multiple pressure zones create underwater depth

  // ── ABYSSAL FOUNDATION ──
  const abyG=ctx.createLinearGradient(0,H*0.18,0,H);
  abyG.addColorStop(0,  rgb(C.abyss,0.0));
  abyG.addColorStop(0.12,rgb(C.deep, 0.72+bassVal*0.18));
  abyG.addColorStop(0.40,rgb(C.navy, 0.85+bassVal*0.12));
  abyG.addColorStop(0.72,rgb([2,10,24],0.92));
  abyG.addColorStop(1,  rgb(C.void, 0.98));
  ctx.fillStyle=abyG;ctx.fillRect(0,H*0.18,W,H*0.82);

  // ── PRESSURE ZONES — dark indigo pockets of compressed water ──
  // These give the ocean its anatomical weight
  for(let pz=0;pz<5;pz++){
    const px=W*(0.08+pz*0.19+Math.sin(phaseDeep*0.3+pz*1.1)*0.06);
    const py=H*(0.58+pz%2*0.12+Math.sin(phaseDeep*0.5+pz*0.7)*0.04);
    const pr=H*(0.08+pz%3*0.04+bassVal*0.06);
    const pzG=ctx.createRadialGradient(px,py,0,px,py,pr);
    pzG.addColorStop(0,  rgb(C.indigo,0.18+bassVal*0.14+convergence*0.08));
    pzG.addColorStop(0.5,rgb(C.pressure,0.08+bassVal*0.06));
    pzG.addColorStop(1,  'rgba(0,0,0,0)');
    ctx.fillStyle=pzG;ctx.fillRect(0,0,W,H);
  }

  // ── BIOLUMINESCENT SURF ZONE — the lit body of the wave ──
  // Primary zone — centered in active surf area
  const sz1=ctx.createRadialGradient(W*0.42,H*0.70,0,W*0.42,H*0.70,W*0.55);
  sz1.addColorStop(0,  rgb(C.teal,  0.32+bassVal*0.28+convergence*0.35+tensionAmt*0.20));
  sz1.addColorStop(0.22,rgb(C.ocean,0.20+bassVal*0.16+convergence*0.18));
  sz1.addColorStop(0.50,rgb(C.deep, 0.10+bassVal*0.08));
  sz1.addColorStop(0.82,'rgba(0,0,0,0)');
  ctx.fillStyle=sz1;ctx.fillRect(0,0,W,H);

  // Secondary — offset, creates asymmetric depth
  const sz2=ctx.createRadialGradient(W*0.22,H*0.78,0,W*0.22,H*0.78,W*0.36);
  sz2.addColorStop(0,  rgb(C.emerald,0.22+fifthVal*0.18+convergence*0.20));
  sz2.addColorStop(0.45,'rgba(0,0,0,0)');
  ctx.fillStyle=sz2;ctx.fillRect(0,0,W,H);

  // Channel Islands cold-water teal — right side where swell originates
  const sz3=ctx.createRadialGradient(W*0.78,H*0.58,0,W*0.78,H*0.58,W*0.30);
  sz3.addColorStop(0,  rgb(C.teal,0.18+convergence*0.20+waveBreak*0.18));
  sz3.addColorStop(0.5,'rgba(0,0,0,0)');
  ctx.fillStyle=sz3;ctx.fillRect(0,0,W,H);
}

// ══════════════════════════════════════════════════════════════
//  DRAW: SUBSURFACE PARALLAX — depth, immersion, cinematic scale
//  Five layers moving at different speeds
// ══════════════════════════════════════════════════════════════
function drawSubsurface(){
  // Layer A: Deep particulate — slowest, large, barely visible
  // Mimics suspended sediment and deep bioluminescent organisms
  for(let di=0;di<45;di++){
    const dx=((di*137.508+phaseDeep*W*0.08))%W;
    const dy=H*(0.45+di%7*0.068)+Math.sin(phaseDeep*0.8+di*0.6)*H*0.022;
    if(dy<waveMid(dx)+H*0.025) continue;
    const dr=H*(0.003+di%3*0.002);
    const da=0.04+noise(di*7,phaseDeep,4)*0.05;
    ctx.beginPath();ctx.arc(dx,dy,dr,0,Math.PI*2);
    ctx.fillStyle=rgb(C.ocean,da);ctx.fill();
  }

  // Layer B: Mid current drift — medium speed, medium size
  // Kelp-motion curves — Channel Islands DNA
  for(let ki=0;ki<18;ki++){
    const kx=((ki*97.3+phaseMid*W*0.15))%W;
    const ky=H*(0.48+ki%4*0.10)+Math.sin(phaseMid*1.2+ki*0.8)*H*0.032;
    if(ky<waveSurf(kx)+H*0.018) continue;
    const kLen=H*(0.028+ki%3*0.012);
    const kSway=Math.sin(phaseMid*1.8+ki*1.1)*H*0.018;
    ctx.beginPath();
    ctx.moveTo(kx,ky);
    ctx.bezierCurveTo(kx+kSway*0.4,ky+kLen*0.4,kx+kSway*0.8,ky+kLen*0.7,kx+kSway,ky+kLen);
    ctx.strokeStyle=rgb(C.emerald,0.10+noise(ki*5,phaseMid,3)*0.08);
    ctx.lineWidth=H*0.0018;ctx.lineCap='round';ctx.stroke();
  }

  // Layer C: Microbubbles — fast, tiny, rising
  for(let bi=0;bi<55;bi++){
    const bx=W*(0.04+bi/55*0.92)+Math.sin(phaseSurf*0.6+bi*0.9)*W*0.018;
    const bPhase=(phaseRipple*0.04+bi*0.08)%1;
    const by=H*(0.92-bPhase*0.55);
    if(by<waveSurf(bx)) continue;
    const br=H*(0.0012+bi%3*0.0006);
    const ba=0.08+noise(bi*3,phaseRipple,3)*0.10;
    ctx.beginPath();ctx.arc(bx,by,br,0,Math.PI*2);
    ctx.strokeStyle=rgb(C.foam,ba*0.6);ctx.lineWidth=0.4;ctx.stroke();
  }

  // Layer D: Sunlight inside moving water — refracted light veins
  // "sunlight inside moving water" — Channel Islands identity
  for(let li=0;li<12;li++){
    const lx1=W*(0.05+li*0.08+Math.sin(phaseDeep*0.4+li*0.6)*0.04);
    const ly1=H*(0.30+li%3*0.04);
    const lx2=lx1+Math.sin(phaseSurf*0.8+li)*W*0.06;
    const ly2=H*(0.62+li%4*0.06);
    if(ly1<waveDeep(lx1)) continue;
    const lg=ctx.createLinearGradient(lx1,ly1,lx2,ly2);
    lg.addColorStop(0,'rgba(0,0,0,0)');
    lg.addColorStop(0.35,rgb(C.aqua,0.05+fifthVal*0.06+convergence*0.04));
    lg.addColorStop(0.65,rgb(C.teal,0.04+fifthVal*0.04));
    lg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.moveTo(lx1,ly1);ctx.lineTo(lx2,ly2);
    ctx.strokeStyle=lg;ctx.lineWidth=H*(0.004+li%3*0.002);ctx.stroke();
  }
}

// ══════════════════════════════════════════════════════════════
//  DRAW: INTERNAL LIGHT VEINS — neural tissue, jellyfish translucency
//  Branching bioluminescent filaments inside the wave body
//  "whale-song geometry, liquid lungs, ionized ocean membrane"
// ══════════════════════════════════════════════════════════════
function drawLightVeins(){
  const veinCount=10+Math.floor(tensionAmt*8+convergence*6);
  for(let vi=0;vi<veinCount;vi++){
    const vx=W*(0.06+vi/veinCount*0.86);
    const vy=waveMid(vx)+H*(0.012+vi%4*0.010);
    // Vein grows downward into wave body
    const vDepth=H*(0.040+tensionAmt*0.060+convergence*0.045+bassVal*0.030);
    const vAngle=Math.PI*0.5+Math.sin(T*0.012+vi*0.65)*0.40+tensionAmt*0.28;
    const vTipX=vx+Math.cos(vAngle)*vDepth;
    const vTipY=vy+Math.sin(vAngle)*vDepth;

    // Main vein — primary vessel
    const vAlpha=(0.08+tensionAmt*0.16+convergence*0.12+bloomAmt*0.25)
                *(1-Math.abs(vi-veinCount/2)/(veinCount/2)*0.55);
    const vG=ctx.createLinearGradient(vx,vy,vTipX,vTipY);
    vG.addColorStop(0,wCol(vAlpha*0.85));
    vG.addColorStop(0.5,wCol(vAlpha*0.55));
    vG.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.moveTo(vx,vy);ctx.lineTo(vTipX,vTipY);
    ctx.strokeStyle=vG;ctx.lineWidth=0.6+tensionAmt*0.7;ctx.lineCap='round';ctx.stroke();

    // Branch 1 — secondary vessel at 40% along
    if(tensionAmt>0.25&&vi%2===0){
      const b1x=vx+(vTipX-vx)*0.40,b1y=vy+(vTipY-vy)*0.40;
      const b1Angle=vAngle+0.55+Math.sin(T*0.018+vi)*0.20;
      const b1Len=vDepth*0.48;
      ctx.beginPath();ctx.moveTo(b1x,b1y);
      ctx.lineTo(b1x+Math.cos(b1Angle)*b1Len,b1y+Math.sin(b1Angle)*b1Len);
      ctx.strokeStyle=vG;ctx.lineWidth=0.35+tensionAmt*0.35;ctx.stroke();
    }
    // Branch 2 — tertiary at tension peak
    if(tensionAmt>0.55&&vi%3===0){
      const b2x=vx+(vTipX-vx)*0.65,b2y=vy+(vTipY-vy)*0.65;
      const b2Angle=vAngle-0.48+Math.sin(T*0.022+vi)*0.15;
      const b2Len=vDepth*0.30;
      ctx.beginPath();ctx.moveTo(b2x,b2y);
      ctx.lineTo(b2x+Math.cos(b2Angle)*b2Len,b2y+Math.sin(b2Angle)*b2Len);
      ctx.strokeStyle=vG;ctx.lineWidth=0.22;ctx.stroke();
    }
  }

  // ── RESPIRATORY PULSE — wave breathes independently of surfer ──
  const respPhase=Math.sin(T*0.019)*0.5+0.5;
  const respAmt=respPhase*(0.45+tensionAmt*0.45);
  if(respAmt>0.12){
    ctx.beginPath();
    for(let px=0;px<=W;px+=5){
      const wy=waveMid(px);
      const expand=H*(0.010+tensionAmt*0.016)*respAmt;
      px===0?ctx.moveTo(px,wy-expand):ctx.lineTo(px,wy-expand);
    }
    for(let px=W;px>=0;px-=5) ctx.lineTo(px,waveMid(px));
    ctx.closePath();
    ctx.fillStyle=wCol(respAmt*(0.06+tensionAmt*0.05));
    ctx.fill();
  }

  // Energy pulse along veins at bloom
  if(bloomAmt>0.08){
    for(let px=0;px<=W;px+=5){
      const wy=waveMid(px);
      const bDist=Math.abs(px-W*0.45)/W;
      const bA=bloomAmt*(1-bDist*2.2)*0.55;
      if(bA<=0) continue;
      ctx.beginPath();ctx.arc(px,wy,H*(0.003+bloomAmt*0.004)*bA,0,Math.PI*2);
      ctx.fillStyle=rgb(C.white,bA);ctx.fill();
    }
  }
}

// ══════════════════════════════════════════════════════════════
//  DRAW: WAVE BODY — the four-layer ocean surface
//  Each layer moves at a different speed — this creates life
// ══════════════════════════════════════════════════════════════
function drawWaveBody(){
  // Draw 6 swells from back to front
  // Each has a face fill + crest line
  for(let wi=5;wi>=0;wi--){
    const wt=wi/5;
    const isActive=wi>=2&&wi<=4;

    // Use different layers per wave — creates parallax
    const wFn=wi<=1?waveDeep:wi<=3?waveMid:waveSurf;

    // ── WAVE FACE FILL — the lit face of the swell ──
    if(wi<5){
      const nextFn=wi<=0?waveDeep:wi<=2?waveMid:waveSurf;
      ctx.beginPath();
      for(let px=0;px<=W;px+=5){
        const wY=wFn(px)+(5-wi)*H*0.008;
        px===0?ctx.moveTo(px,wY):ctx.lineTo(px,wY);
      }
      for(let px=W;px>=0;px-=5){
        ctx.lineTo(px,nextFn(px)+(5-wi-1)*H*0.008+H*0.005);
      }
      ctx.closePath();
      // Color — emerald transitions in face, cyan at crest
      const faceAlpha=isActive
        ?0.14+fifthVal*0.12+convergence*0.14+tensionAmt*0.10+bassVal*0.08
        :0.05+fifthVal*0.04+bassVal*0.03;
      ctx.fillStyle=rgb(isActive?C.ocean:C.deep,faceAlpha);
      ctx.fill();
      // Emerald transition — Channel Islands character
      if(isActive){
        const emG=ctx.createLinearGradient(0,H*0.35,0,H*0.65);
        emG.addColorStop(0,'rgba(0,0,0,0)');
        emG.addColorStop(0.5,rgb(C.emerald,0.06+convergence*0.06));
        emG.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=emG;ctx.fill();
      }
    }

    // ── ATMOSPHERIC GLOW beneath crest ──
    ctx.beginPath();
    for(let px=-10;px<=W+10;px+=4){
      const wY=wFn(px)+(5-wi)*H*0.008;
      px===-10?ctx.moveTo(px,wY):ctx.lineTo(px,wY);
    }
    const glowAlpha=isActive?0.16+fifthVal*0.14+convergence*0.18+tensionAmt*0.14:0.04+convergence*0.04;
    ctx.strokeStyle=rgb(C.ocean,glowAlpha);
    ctx.lineWidth=isActive?10+tensionAmt*10+bassVal*8:3+convergence*3;
    ctx.lineCap='round';ctx.stroke();

    // ── CREST LINE ──
    ctx.beginPath();
    for(let px=-10;px<=W+10;px+=3){
      const wY=wFn(px)+(5-wi)*H*0.008;
      px===-10?ctx.moveTo(px,wY):ctx.lineTo(px,wY);
    }
    const lineAlpha=isActive?0.50+fifthVal*0.18+convergence*0.20+tensionAmt*0.15:0.12+wt*0.05;
    ctx.strokeStyle=rgb(isActive?C.teal:C.deep,lineAlpha);
    ctx.lineWidth=wi===3?2.2+convergence*1.8+tensionAmt*1.5:isActive?1.3+convergence*1.0:0.5;
    ctx.stroke();

    // Bright crest on active waves
    if(isActive){
      ctx.beginPath();
      for(let px=-10;px<=W+10;px+=3){
        const wY=wFn(px)+(5-wi)*H*0.008;
        px===-10?ctx.moveTo(px,wY):ctx.lineTo(px,wY);
      }
      ctx.strokeStyle=wCol(0.25+fifthVal*0.15+convergence*0.20+tensionAmt*0.15);
      ctx.lineWidth=0.8+convergence*0.8+tensionAmt*0.8;ctx.stroke();
    }
  }
}

// ══════════════════════════════════════════════════════════════
//  DRAW: THE LIP — living calligraphy, the wave's signature
//  "The crest/top lip is where the emotion lives"
//  Folding tension · stretch before release · cascading strands
//  Manta ray wings · whale spine · muscle tissue · neural arcs
// ══════════════════════════════════════════════════════════════
function drawLip(sx,sy){
  // ── ATMOSPHERIC PRESENCE — lip has mass in the air ──
  ctx.beginPath();
  for(let px=-10;px<=W+10;px+=4){
    const ly=waveLip(px);
    px===-10?ctx.moveTo(px,ly):ctx.lineTo(px,ly);
  }
  ctx.strokeStyle=wCol(0.12+tensionAmt*0.20+convergence*0.18+bloomAmt*0.28);
  ctx.lineWidth=22+tensionAmt*18+bloomAmt*26;ctx.lineCap='round';ctx.stroke();

  // ── LIP BODY — the visible crest ──
  ctx.beginPath();
  for(let px=-10;px<=W+10;px+=3){
    const ly=waveLip(px);
    px===-10?ctx.moveTo(px,ly):ctx.lineTo(px,ly);
  }
  ctx.strokeStyle=wCol(0.45+tensionAmt*0.32+convergence*0.22+bloomAmt*0.35);
  ctx.lineWidth=3.0+tensionAmt*2.5+convergence*2.0+bloomAmt*4.0;ctx.stroke();

  // ── CALLIGRAPHIC CORE — variable pressure, living stroke ──
  // Width modulates with tension and position — not uniform
  // "Like a brushstroke under pressure" — the wave writes itself
  let prevX=-10,prevY=waveLip(-10);
  for(let px=-5;px<=W+5;px+=3){
    const ly=waveLip(px);
    const nx=px/W;
    // Calligraphic pressure — varies along the lip
    const press=Math.sin(nx*Math.PI*2.8+T*0.025)*0.5+0.5;
    const localTension=tensionAmt*Math.sin(nx*Math.PI);
    const cW=1.0+localTension*2.5+convergence*1.8+press*(localTension*1.5+convergence*0.8)+bloomAmt*3.0;
    ctx.beginPath();ctx.moveTo(prevX,prevY);ctx.lineTo(px,ly);
    ctx.strokeStyle=wCol(0.75+tensionAmt*0.18+convergence*0.14+bloomAmt*0.25);
    ctx.lineWidth=cW;ctx.lineCap='round';ctx.stroke();
    prevX=px;prevY=ly;
  }

  // ── MANTA WING BEHAVIOR ──
  // At tension: lip edges lift — the wave is aware, banking
  if(tensionAmt>0.25){
    const wingLift=H*(tensionAmt-0.25)*0.055;
    [[0,W*0.24,1],[W,W*0.76,-1]].forEach(([startX,endX,dir])=>{
      ctx.beginPath();
      for(let px=startX;dir>0?px<=endX:px>=endX;px+=dir*4){
        const nx=dir>0?px/W:1-px/W;
        const lift=wingLift*(1-nx/0.24)*(1-nx/0.24);
        const ly=waveLip(px)-lift;
        px===startX?ctx.moveTo(px,ly):ctx.lineTo(px,ly);
      }
      ctx.strokeStyle=wCol((tensionAmt-0.25)*0.42);
      ctx.lineWidth=1.4+tensionAmt*1.2;ctx.stroke();
    });
  }

  // ── CASCADING STRANDS — water adhesion before breaking ──
  // "Stretch before release" — strands hang from lip at tension peak
  if(tensionAmt>0.45){
    const strandCount=Math.floor((tensionAmt-0.45)*18+convergence*8);
    for(let si=0;si<strandCount;si++){
      const sx2=W*(0.08+si/(strandCount)*0.82);
      const sy2=waveLip(sx2);
      const sLen=H*(0.012+tensionAmt*0.022+Math.random()*0.015);
      const sSway=Math.sin(T*0.025+si*0.8)*H*0.008;
      ctx.beginPath();ctx.moveTo(sx2,sy2);ctx.lineTo(sx2+sSway,sy2+sLen);
      const sG=ctx.createLinearGradient(sx2,sy2,sx2+sSway,sy2+sLen);
      sG.addColorStop(0,wCol(0.35+tensionAmt*0.20));
      sG.addColorStop(1,'rgba(0,0,0,0)');
      ctx.strokeStyle=sG;ctx.lineWidth=0.5+tensionAmt*0.4;ctx.lineCap='round';ctx.stroke();
    }
  }

  // ── PEELING BREAK ──
  const peel=(phaseRipple*W*0.15)%W;
  const breakX=W*0.82-peel*0.55;
  if(breakX>-W*0.1&&breakX<W*1.1){
    const bW=W*0.085+convergence*W*0.055+waveBreak*W*0.04;
    // Break foam
    ctx.beginPath();
    for(let px=Math.max(-10,breakX-bW*0.4);px<=Math.min(W+10,breakX+bW*0.5);px+=2){
      const ly=waveLip(px);
      px===Math.max(-10,breakX-bW*0.4)?ctx.moveTo(px,ly):ctx.lineTo(px,ly);
    }
    ctx.strokeStyle=rgb(C.white,0.62+convergence*0.25+waveBreak*0.22+bloomAmt*0.20);
    ctx.lineWidth=2.5+convergence*2.0+waveBreak*1.8+bloomAmt*2.5;ctx.stroke();
    // Mist/froth — reactive to emotion and contact
    const mistN=Math.floor(12+convergence*18+waveBreak*22+tensionAmt*12);
    for(let fi=0;fi<mistN;fi++){
      const fpx=breakX+(Math.random()-0.4)*bW*3.2;
      if(fpx<0||fpx>W)continue;
      const fpy=waveLip(fpx)+(Math.random()-0.3)*H*0.030;
      const fR=H*(0.003+Math.random()*0.007)*(0.45+convergence*0.55);
      ctx.beginPath();ctx.arc(fpx,fpy,fR,0,Math.PI*2);
      ctx.fillStyle=rgb(C.foam,(0.45+convergence*0.35+bloomAmt*0.30)*Math.random());
      ctx.fill();
    }
    // Foam trail — the peel's memory
    const tLen=W*(0.22+convergence*0.14+tensionAmt*0.10);
    ctx.beginPath();
    for(let px=breakX;px<=Math.min(W+10,breakX+tLen);px+=4){
      const ly=waveLip(px);px===breakX?ctx.moveTo(px,ly):ctx.lineTo(px,ly);
    }
    const tG=ctx.createLinearGradient(breakX,0,breakX+tLen,0);
    tG.addColorStop(0, rgb(C.white,0.40+convergence*0.22+bloomAmt*0.20));
    tG.addColorStop(0.3,rgb(C.foam, 0.22+convergence*0.12));
    tG.addColorStop(0.7,rgb(C.teal, 0.10+convergence*0.06));
    tG.addColorStop(1,  'rgba(0,0,0,0)');
    ctx.strokeStyle=tG;ctx.lineWidth=1.0+convergence*0.8;ctx.stroke();
  }

  // ── NEURAL ARC — the wave notices the visitor ──
  if(convergence>0.18){
    const arcY=waveLip(sx);
    const arcDrop=H*(convergence-0.18)*0.062;
    ctx.beginPath();
    ctx.moveTo(sx-W*0.14,waveLip(sx-W*0.14));
    ctx.quadraticCurveTo(sx,arcY+arcDrop,sx+W*0.11,waveLip(sx+W*0.11));
    ctx.strokeStyle=wCol((convergence-0.18)*0.50);
    ctx.lineWidth=1.6+convergence*1.4;ctx.stroke();
    const naG=ctx.createLinearGradient(sx-W*0.14,0,sx+W*0.11,0);
    naG.addColorStop(0,'rgba(0,0,0,0)');
    naG.addColorStop(0.5,wCol((convergence-0.18)*0.18));
    naG.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.moveTo(sx-W*0.14,waveLip(sx-W*0.14));
    ctx.quadraticCurveTo(sx,arcY+arcDrop,sx+W*0.11,waveLip(sx+W*0.11));
    ctx.strokeStyle=naG;ctx.lineWidth=(1.6+convergence*1.4)*9;ctx.stroke();
  }

  // ── BLOOM RUPTURE — white luminous fracture along lip ──
  if(bloomAmt>0.06){
    for(let px=0;px<=W;px+=4){
      const ly=waveLip(px);
      const nx=px/W;
      const bA=bloomAmt*(1-Math.abs(nx-0.46)*1.9)*0.70;
      if(bA<=0)continue;
      ctx.beginPath();ctx.arc(px,ly,H*(0.004+bloomAmt*0.006)*bA,0,Math.PI*2);
      ctx.fillStyle=rgb(C.white,bA*0.80);ctx.fill();
    }
  }
}

// ══════════════════════════════════════════════════════════════
//  DRAW: OCEAN MEMORY — "the ocean remembers the ride"
//  Geometric pressure echoes lingering after bloom
// ══════════════════════════════════════════════════════════════
function drawMemory(){
  memoryTraces.forEach(m=>{
    if(m.life<=0)return;
    const alpha=m.life*m.alpha;
    ctx.save();ctx.translate(m.x,m.y);ctx.rotate(m.angle);
    for(let ai=0;ai<3;ai++){
      const arc0=(ai/3)*Math.PI*2+m.life*0.45;
      const arc1=arc0+Math.PI*0.52;
      ctx.beginPath();ctx.arc(0,0,m.r*(0.82+ai*0.12),arc0,arc1);
      ctx.strokeStyle=wCol(alpha*(1-ai*0.28)*0.42);
      ctx.lineWidth=0.9*(1-ai*0.22)*m.life;ctx.stroke();
    }
    ctx.beginPath();ctx.arc(0,0,m.r*0.35,0,Math.PI*2);
    ctx.strokeStyle=wCol(alpha*0.16);ctx.lineWidth=0.45*m.life;ctx.stroke();
    ctx.restore();
  });
}

// ══════════════════════════════════════════════════════════════
//  DRAW: WAKE — memory of mass
// ══════════════════════════════════════════════════════════════
function drawWake(){
  wake.forEach(p=>{
    const a=p.life*0.18*(0.5+convergence*0.22);
    const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*2.2);
    g.addColorStop(0,rgb(C.ocean,a*0.72));
    g.addColorStop(0.5,rgb(C.deep,a*0.32));
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*2.2,0,Math.PI*2);
    ctx.fillStyle=g;ctx.fill();
  });
}

// ══════════════════════════════════════════════════════════════
//  DRAW: TRIM LINE — spine of the organism/visitor
// ══════════════════════════════════════════════════════════════
function drawTrimLine(sx,sy){
  const oX=W*0.02,oY=H*(0.68+(1-breath)*0.04);
  const c1X=sx-W*0.16,c1Y=sy+H*0.022;
  // Wide aura
  ctx.beginPath();ctx.moveTo(oX,oY);
  ctx.quadraticCurveTo(c1X,c1Y,sx,sy);
  const tG1=ctx.createLinearGradient(oX,oY,sx,sy);
  tG1.addColorStop(0,'rgba(0,0,0,0)');
  tG1.addColorStop(0.4,rgb(C.ocean,0.14+convergence*0.12));
  tG1.addColorStop(1,  rgb(C.teal, 0.32+breath*0.16+convergence*0.18));
  ctx.strokeStyle=tG1;ctx.lineWidth=28+breath*14+convergence*20;ctx.lineCap='round';ctx.stroke();
  // Body
  ctx.beginPath();ctx.moveTo(oX,oY);ctx.quadraticCurveTo(c1X,c1Y,sx,sy);
  const tG2=ctx.createLinearGradient(oX,oY,sx,sy);
  tG2.addColorStop(0,'rgba(0,0,0,0)');
  tG2.addColorStop(0.45,rgb(C.aqua,0.35+breath*0.18));
  tG2.addColorStop(1,  rgb(C.foam,0.65+breath*0.22+convergence*0.18));
  ctx.strokeStyle=tG2;ctx.lineWidth=4.5+breath*2.5+convergence*4;ctx.stroke();
  // Core
  ctx.beginPath();ctx.moveTo(oX,oY);ctx.quadraticCurveTo(c1X,c1Y,sx,sy);
  const tG3=ctx.createLinearGradient(oX,oY,sx,sy);
  tG3.addColorStop(0,'rgba(0,0,0,0)');
  tG3.addColorStop(0.5,rgb(C.aqua,0.55+breath*0.18));
  tG3.addColorStop(1,  rgb(C.white,0.92));
  ctx.strokeStyle=tG3;ctx.lineWidth=1.4+convergence*1.8;ctx.stroke();
  // Forward reach
  const reach=W*(0.09+breath*0.04+convergence*0.07);
  const rAng=-0.16-breath*0.05-convergence*0.07;
  const rX=sx+Math.cos(rAng)*reach,rY=sy+Math.sin(rAng)*reach;
  ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(rX,rY);
  ctx.strokeStyle=rgb(C.teal,0.20+breath*0.14+convergence*0.16);
  ctx.lineWidth=7+breath*4+convergence*7;ctx.lineCap='round';ctx.stroke();
  ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(rX,rY);
  const rG=ctx.createLinearGradient(sx,sy,rX,rY);
  rG.addColorStop(0,rgb(C.white,0.88+convergence*0.10));
  rG.addColorStop(0.6,rgb(C.foam,0.52+breath*0.14));
  rG.addColorStop(1,'rgba(0,0,0,0)');
  ctx.strokeStyle=rG;ctx.lineWidth=1.4+convergence*1.8;ctx.stroke();
}

// ══════════════════════════════════════════════════════════════
//  DRAW: OCEAN LIMBS — the ocean borrowing human gesture
//  "Make the surfer's arms feel less like anatomy and more like
//   the ocean borrowing human gesture for a few seconds." — Heyzig
//
//  No elbow. No hinge. No bone.
//  One continuous spline from shoulder root to fingertip.
//  Edges dissolve into water. Tips arrive late.
//  Asymmetric timing. The ocean leads, the gesture follows.
// ══════════════════════════════════════════════════════════════
function drawFilaments(sx,sy){
  const nodeR=H*(0.022+breath*0.018);
  const wTop=H*0.24;

  // ── DELAYED FOLLOW-THROUGH STATE ──
  // Each limb has a tip position that lags behind the computed position
  // This creates the organic arrival — shoulder first, tip settles last
  // Stored as persistent values updated each frame
  if(!drawFilaments._fwdTipX){
    drawFilaments._fwdTipX=sx+W*0.32;
    drawFilaments._fwdTipY=sy+H*0.08;
    drawFilaments._trlTipX=sx-W*0.18;
    drawFilaments._trlTipY=sy-H*0.08;
    drawFilaments._fwdMidX=sx+W*0.18;
    drawFilaments._fwdMidY=sy+H*0.04;
    drawFilaments._trlMidX=sx-W*0.10;
    drawFilaments._trlMidY=sy-H*0.04;
    drawFilaments._contactLife=0;
    drawFilaments._contactX=0;
    drawFilaments._contactY=0;
  }

  // SWAM drives amplitude, pitchwheel drives flow frequency
  const flapFreq=0.7+zigCent*1.6;
  const flapAmp =swamVal*0.09+breath*0.038;
  const tFlapAmp=swamVal*0.07+breath*0.028;

  // ── FORWARD LIMB — TARGET POSITIONS ──
  // One flowing arc: low and forward, reaching into the wave future
  // Asymmetric — forward limb is longer, lower, leads
  const fLen  = W*(0.34+breath*0.09+convergence*0.09);
  const fAng  = 0.14+breath*0.055+convergence*0.07
               +Math.sin(T*flapFreq*0.026)*flapAmp;

  // Target for tip — one continuous arc end
  const fTgtTipX = sx+Math.cos(fAng)*fLen;
  const fTgtTipY = sy+Math.sin(fAng)*fLen;

  // Mid control point — the arc's belly, droops below the line
  // This creates the kelp/ribbon quality — not a straight arm
  const fTgtMidX = sx+(fTgtTipX-sx)*0.52+Math.sin(T*flapFreq*0.031)*W*0.022;
  const fTgtMidY = sy+(fTgtTipY-sy)*0.52+H*(0.038+breath*0.015)
                  +Math.sin(T*flapFreq*0.019+0.8)*H*0.014;

  // ── TRAILING LIMB — TARGET POSITIONS ──
  // Also one continuous arc: shorter, lifted, lags in time
  // Deliberately asymmetric — different phase from forward limb
  const tLen  = W*(0.20+breath*0.038+convergence*0.028);
  const tAng  = Math.PI-0.52-breath*0.12-convergence*0.09
               +Math.sin(T*flapFreq*0.026+Math.PI*0.7)*tFlapAmp;  // different phase = asymmetry

  const tTgtTipX = sx+Math.cos(tAng)*tLen;
  const tTgtTipY = Math.min(sy+Math.sin(tAng)*tLen, wTop-H*0.06);

  // Trail mid — curves upward before descending to tip
  const tTgtMidX = sx+(tTgtTipX-sx)*0.48+Math.sin(T*flapFreq*0.029+1.2)*W*0.015;
  const tTgtMidY = sy+(tTgtTipY-sy)*0.48-H*(0.025+breath*0.010)
                  +Math.sin(T*flapFreq*0.022+2.1)*H*0.012;

  // ── DELAYED FOLLOW-THROUGH ──
  // Tip lags behind target — arrives late, overshoots slightly
  // Shoulder (near node) responds immediately
  // Mid responds at medium speed
  // Tip responds slowest — creates the organic wave of motion
  const tipLag = 0.055+flapAmp*0.02;   // slower = more lag
  const midLag = 0.12+flapAmp*0.03;

  drawFilaments._fwdMidX+=(fTgtMidX-drawFilaments._fwdMidX)*midLag;
  drawFilaments._fwdMidY+=(fTgtMidY-drawFilaments._fwdMidY)*midLag;
  drawFilaments._fwdTipX+=(fTgtTipX-drawFilaments._fwdTipX)*tipLag;
  drawFilaments._fwdTipY+=(fTgtTipY-drawFilaments._fwdTipY)*tipLag;

  drawFilaments._trlMidX+=(tTgtMidX-drawFilaments._trlMidX)*(midLag*0.82);
  drawFilaments._trlMidY+=(tTgtMidY-drawFilaments._trlMidY)*(midLag*0.82);
  drawFilaments._trlTipX+=(tTgtTipX-drawFilaments._trlTipX)*(tipLag*0.78);
  drawFilaments._trlTipY+=(tTgtTipY-drawFilaments._trlTipY)*(tipLag*0.78);

  const fTipX=drawFilaments._fwdTipX, fTipY=drawFilaments._fwdTipY;
  const fMidX=drawFilaments._fwdMidX, fMidY=drawFilaments._fwdMidY;
  const tTipX=drawFilaments._trlTipX, tTipY=drawFilaments._trlTipY;
  const tMidX=drawFilaments._trlMidX, tMidY=drawFilaments._trlMidY;

  // ── NEGATIVE SPACE — suppress background along limb paths ──
  [[sx,sy,fMidX,fMidY,fTipX,fTipY,28+breath*14],
   [sx,sy,tMidX,tMidY,tTipX,tTipY,18+breath*9]].forEach(([x0,y0,cx,cy,tx,ty,lw])=>{
    const sg=ctx.createLinearGradient(x0,y0,tx,ty);
    sg.addColorStop(0,'rgba(0,0,0,0)');
    sg.addColorStop(0.08,'rgba(0,0,0,0.32)');
    sg.addColorStop(0.55,'rgba(0,0,0,0.18)');
    sg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.moveTo(x0,y0);
    ctx.quadraticCurveTo(cx,cy,tx,ty);
    ctx.strokeStyle=sg;ctx.lineWidth=lw;ctx.lineCap='round';ctx.stroke();
  });

  // ── DRAW LIMB — function for one continuous ocean-ribbon ──
  // Three passes: dissolving glow → body → bright core thread
  // Width tapers from shoulder (wide) to tip (zero) — ribbon not rod
  // Edge semi-dissolves — no hard border, water returning to ocean
  function drawLimb(x0,y0,cxM,cyM,tx,ty,isForward){
    const energy=isForward
      ? 0.55+breath*0.22+convergence*0.18
      : 0.42+breath*0.16+convergence*0.14;  // trail limb quieter

    // ── PASS 1: DISSOLVING OUTER GLOW ──
    // Wide, very soft — the water that hasn't yet decided to be an arm
    // Fades to nothing at tip — edge returns to ocean
    ctx.beginPath();ctx.moveTo(x0,y0);
    ctx.quadraticCurveTo(cxM,cyM,tx,ty);
    const g1=ctx.createLinearGradient(x0,y0,tx,ty);
    g1.addColorStop(0,  rgb(C.aqua,  energy*0.20+convergence*0.10));
    g1.addColorStop(0.35,rgb(C.teal, energy*0.14+convergence*0.07));
    g1.addColorStop(0.70,rgb(C.ocean,energy*0.06));
    g1.addColorStop(1,  'rgba(0,0,0,0)');
    ctx.strokeStyle=g1;ctx.lineWidth=isForward?16+breath*10+convergence*12:10+breath*6+convergence*8;
    ctx.lineCap='round';ctx.stroke();

    // ── PASS 2: RIBBON BODY ──
    // Main visible arm — flows like kelp or manta fin
    // Tapers by reducing alpha toward tip, not hard cutoff
    ctx.beginPath();ctx.moveTo(x0,y0);
    ctx.quadraticCurveTo(cxM,cyM,tx,ty);
    const g2=ctx.createLinearGradient(x0,y0,tx,ty);
    g2.addColorStop(0,   rgb(C.foam, energy*0.70));
    g2.addColorStop(0.30,rgb(C.aqua, energy*0.58));
    g2.addColorStop(0.60,rgb(C.teal, energy*0.32));
    g2.addColorStop(0.82,rgb(C.ocean,energy*0.12));
    g2.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.strokeStyle=g2;
    ctx.lineWidth=isForward?3.2+breath*1.8+convergence*2.2:2.2+breath*1.2+convergence*1.5;
    ctx.stroke();

    // ── PASS 3: BRIGHT CORE THREAD ──
    // Thin luminous spine inside the limb — the nervous filament
    // Fades faster than body — gone before tip
    ctx.beginPath();ctx.moveTo(x0,y0);
    ctx.quadraticCurveTo(cxM,cyM,tx,ty);
    const g3=ctx.createLinearGradient(x0,y0,tx,ty);
    g3.addColorStop(0,   rgb(C.white,energy*0.92));
    g3.addColorStop(0.28,rgb(C.foam, energy*0.72));
    g3.addColorStop(0.55,rgb(C.aqua, energy*0.35));
    g3.addColorStop(0.78,rgb(C.teal, energy*0.10));
    g3.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.strokeStyle=g3;
    ctx.lineWidth=isForward?1.2+breath*0.6+convergence*1.0:0.8+breath*0.4;
    ctx.stroke();

    // ── PASS 4: RESIDUAL WAVE ──
    // Small ripple along the limb — the wake of the gesture
    // Like turbulence behind a fin moving through water
    if(energy>0.45&&Math.sin(T*flapFreq*0.025)>0.3){
      const rOff=Math.sin(T*flapFreq*0.025)*H*0.008;
      ctx.beginPath();ctx.moveTo(x0,y0+rOff);
      ctx.quadraticCurveTo(cxM,cyM+rOff*0.6,tx,ty+rOff*0.2);
      ctx.strokeStyle=rgb(C.aqua,energy*0.12);
      ctx.lineWidth=0.5;ctx.stroke();
    }
  }

  drawLimb(sx,sy,fMidX,fMidY,fTipX,fTipY,true);
  drawLimb(sx,sy,tMidX,tMidY,tTipX,tTipY,false);

  // ── CONTACT FROTH — when forward tip approaches wave lip ──
  // The gesture brushes the ocean surface — bioluminescent foam forms
  const lipY=waveLip?waveLip(fTipX):H*0.38;
  const distToLip=Math.abs(fTipY-lipY);
  if(distToLip<H*0.06&&breath>0.25){
    // Contact event — spawn glowing scar
    const contactIntensity=Math.max(0,(H*0.06-distToLip)/(H*0.06));
    drawFilaments._contactLife=Math.min(1.0,drawFilaments._contactLife+contactIntensity*0.08);
    drawFilaments._contactX=fTipX;
    drawFilaments._contactY=fTipY;
  }
  drawFilaments._contactLife=Math.max(0,drawFilaments._contactLife-0.018);

  if(drawFilaments._contactLife>0.04){
    const cl=drawFilaments._contactLife;
    const cx2=drawFilaments._contactX;
    const cy2=drawFilaments._contactY;
    // Glowing scar — elongated along wave direction
    const scarG=ctx.createRadialGradient(cx2,cy2,0,cx2,cy2,H*(0.030+cl*0.020));
    scarG.addColorStop(0,rgb(C.white,cl*0.65));
    scarG.addColorStop(0.30,rgb(C.foam, cl*0.40));
    scarG.addColorStop(0.60,rgb(C.aqua, cl*0.20));
    scarG.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.arc(cx2,cy2,H*(0.030+cl*0.020),0,Math.PI*2);
    ctx.fillStyle=scarG;ctx.fill();
    // Trailing foam — moves backward with wave scroll
    for(let fi=0;fi<Math.floor(cl*14);fi++){
      const ftx=cx2+fi*W*0.012*(phaseRipple%1)*0.5+Math.random()*W*0.008;
      const fty=cy2+(Math.random()-0.5)*H*0.018;
      const fR=H*(0.002+Math.random()*0.004)*cl*(1-fi/14);
      ctx.beginPath();ctx.arc(ftx,fty,fR,0,Math.PI*2);
      ctx.fillStyle=rgb(C.foam,cl*(1-fi/14)*0.55);ctx.fill();
    }
  }

  // ── FINGER GESTURE — emerges from flow, not anatomy ──
  // Three soft threads fanning from tip — water returning to ocean
  // Not fingers. The idea of fingers.
  [[fTipX,fTipY,fAng,0.55+breath*0.20],
   [tTipX,tTipY,tAng+Math.PI,0.40+breath*0.14]].forEach(([tx2,ty2,ang,alpha])=>{
    if(alpha<0.10)return;
    for(let fi=0;fi<3;fi++){
      const fang=ang+(fi-1)*0.18;
      const flen=H*(0.016+breath*0.006);
      const fTX=tx2+Math.cos(fang)*flen,fTY=ty2+Math.sin(fang)*flen;
      const fG=ctx.createLinearGradient(tx2,ty2,fTX,fTY);
      fG.addColorStop(0,rgb(C.foam,alpha*0.60));
      fG.addColorStop(1,'rgba(0,0,0,0)');
      ctx.beginPath();ctx.moveTo(tx2,ty2);ctx.lineTo(fTX,fTY);
      ctx.strokeStyle=fG;ctx.lineWidth=0.6+breath*0.3;ctx.lineCap='round';ctx.stroke();
    }
  });
}

// ══════════════════════════════════════════════════════════════
//  DRAW: GRAVITY NODE — center of mass, breath ring
// ══════════════════════════════════════════════════════════════
function drawNode(sx,sy){
  const nodeR=H*(0.025+breath*0.022+attack*0.014+convergence*0.010);
  // Negative space
  const ns=ctx.createRadialGradient(sx,sy,nodeR*1.1,sx,sy,nodeR*5.5);
  ns.addColorStop(0,'rgba(0,0,0,0.42)');ns.addColorStop(0.35,'rgba(0,0,0,0.22)');ns.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();ctx.arc(sx,sy,nodeR*5.5,0,Math.PI*2);ctx.fillStyle=ns;ctx.fill();
  // Far field
  const farG=ctx.createRadialGradient(sx,sy,nodeR,sx,sy,nodeR*9);
  farG.addColorStop(0,rgb(C.teal,0.16+breath*0.14+convergence*0.14));
  farG.addColorStop(0.3,rgb(C.ocean,0.08+breath*0.07));
  farG.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();ctx.arc(sx,sy,nodeR*9,0,Math.PI*2);ctx.fillStyle=farG;ctx.fill();
  // Torso — slightly oval, upright being
  ctx.save();ctx.translate(sx,sy);ctx.scale(1.0,1.22);
  const torsoG=ctx.createRadialGradient(0,-nodeR*0.14,0,0,0,nodeR*2.2);
  torsoG.addColorStop(0,rgb(C.bright,0.62+convergence*0.22));
  torsoG.addColorStop(0.5,rgb(C.aqua,0.35+breath*0.14));
  torsoG.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();ctx.arc(0,0,nodeR*2.2,0,Math.PI*2);ctx.fillStyle=torsoG;ctx.fill();
  ctx.restore();
  // Core
  const cG=ctx.createRadialGradient(sx-nodeR*0.20,sy-nodeR*0.20,0,sx,sy,nodeR);
  cG.addColorStop(0,rgb(C.white,0.98));cG.addColorStop(0.32,rgb(C.bright,0.94));
  cG.addColorStop(0.68,rgb(C.aqua,0.86));cG.addColorStop(1,rgb(C.teal,0.72));
  ctx.beginPath();ctx.arc(sx,sy,nodeR,0,Math.PI*2);ctx.fillStyle=cG;ctx.fill();
  // Breath ring
  const ringR=nodeR*(1.8+breath*2.2);
  const ringA=Math.max(0,breath*(0.32+convergence*0.16)*(1-Math.pow(Math.abs(breath-0.5)*1.8,2)));
  if(ringA>0.01){ctx.beginPath();ctx.arc(sx,sy,ringR,0,Math.PI*2);
    ctx.strokeStyle=rgb(C.aqua,ringA);ctx.lineWidth=1.5+breath*0.9;ctx.stroke();}
  if(convergence>0.20){ctx.beginPath();ctx.arc(sx,sy,nodeR*(4.2+convergence*2.8),0,Math.PI*2);
    ctx.strokeStyle=rgb(C.teal,(convergence-0.20)*0.16);ctx.lineWidth=0.7+convergence*0.5;ctx.stroke();}
  if(attack>0.05){
    const fG=ctx.createRadialGradient(sx,sy,0,sx,sy,nodeR*3.5*attack);
    fG.addColorStop(0,rgb(C.white,attack*0.38));fG.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.arc(sx,sy,nodeR*3.5*attack,0,Math.PI*2);ctx.fillStyle=fG;ctx.fill();
  }
}

// ══════════════════════════════════════════════════════════════
//  DRAW: CREST PLUMES — pressure filaments, 3 clean forms
// ══════════════════════════════════════════════════════════════
function drawPlumes(sx,sy){
  const nodeR=H*(0.025+breath*0.022);
  const energy=0.38+breath*0.32+convergence*0.18;
  const wind=0.13+convergence*0.20+Math.sin(T*0.016)*0.03;
  const spineAng=-0.16-breath*0.05;
  const oX=sx+Math.cos(spineAng-Math.PI*0.5)*nodeR*0.80;
  const oY=sy+Math.sin(spineAng-Math.PI*0.5)*nodeR*0.80;
  const fils=[
    {lift:H*0.092,sweep:W*0.044,w:H*0.011,b:0.76},
    {lift:H*0.072,sweep:W*0.035,w:H*0.008,b:0.85},
    {lift:H*0.052,sweep:W*0.028,w:H*0.006,b:0.62},
  ];
  fils.forEach((fl,fi)=>{
    const lm=0.68+breath*0.28+convergence*0.18;
    const ox2=oX-fi*nodeR*0.20,oy2=oY-fi*nodeR*0.08;
    const c1x=ox2-W*0.010,c1y=oy2-fl.lift*lm;
    const tX=ox2+fl.sweep*(0.80+wind),tY=oy2-fl.lift*lm*0.36+fl.lift*0.04;
    [
      [fl.w*3.2,energy*0.14],
      [fl.w*0.50,energy*fl.b*0.88],
    ].forEach(([lw,alpha])=>{
      const pG=ctx.createLinearGradient(ox2,oy2,tX,tY);
      pG.addColorStop(0,wCol(alpha));pG.addColorStop(0.45,wCol(alpha*0.70));pG.addColorStop(1,'rgba(0,0,0,0)');
      ctx.beginPath();ctx.moveTo(ox2,oy2);ctx.quadraticCurveTo(c1x,c1y,tX,tY);
      ctx.strokeStyle=pG;ctx.lineWidth=lw;ctx.lineCap='round';ctx.stroke();
    });
  });
  // Origin
  const oG=ctx.createRadialGradient(oX,oY,0,oX,oY,nodeR*0.50);
  oG.addColorStop(0,rgb(C.foam,energy*0.38));oG.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();ctx.arc(oX,oY,nodeR*0.50,0,Math.PI*2);ctx.fillStyle=oG;ctx.fill();
}

// ══════════════════════════════════════════════════════════════
//  DRAW: WAVE MARKINGS
// ══════════════════════════════════════════════════════════════
function drawMarkings(sx,sy){
  if(convergence<0.10)return;
  const a=convergence*0.22;
  for(let mi=0;mi<4;mi++){
    const mr=H*(0.050+mi*0.035)*convergence;
    ctx.beginPath();ctx.arc(sx+W*0.02,sy+H*0.038,mr,Math.PI*0.80,Math.PI*1.60);
    ctx.strokeStyle=wCol(a*(1-mi*0.18));ctx.lineWidth=0.6+mi*0.12;ctx.stroke();
  }
}

// ══════════════════════════════════════════════════════════════
//  RENDER LOOP
// ══════════════════════════════════════════════════════════════
function render(){
  requestAnimationFrame(render);
  T++;

  // Four motion layers — different speeds
  phaseDeep  +=0.0035; // very slow — tectonic
  phaseMid   +=0.0075; // medium — rolling
  phaseSurf  +=0.0140; // fast — surface
  phaseRipple+=0.0220; // reactive — lip

  // ── GET DATA ──
  let rawTarget;
  if(midiConn&&midiBreath>=0){rawTarget=midiBreath;}
  else{
    midiDnaIdx=(midiDnaIdx+1)%MIDI_DNA.len;
    rawTarget=MIDI_DNA.cc2[midiDnaIdx];
    const noteHit=MIDI_DNA.notes[midiDnaIdx];
    if(noteHit>0.1)convergence=Math.min(1.0,convergence+noteHit*0.25);
    zigCent=MIDI_DNA.pitch[midiDnaIdx];
  }
  dnaIdx=(dnaIdx+1)%DNA_LEN;
  const di=dnaIdx;
  swamVal =ZIGDNA.swam.rms[di];
  bassVal =ZIGDNA.bass.rms[di];
  fifthVal=ZIGDNA.fifth.rms[di];
  chimeVal=ZIGDNA.chime.rms[di];
  quantVal=ZIGDNA.quant.onset[di];
  waveBreak=quantVal>0.45?quantVal*0.72:Math.max(0,waveBreak-0.038);

  // ── BREATH ──
  const delta=rawTarget-breathRaw;
  if(delta>0.052)attack=Math.min(1.0,attack+delta*1.9);
  attack=Math.max(0,attack-0.011);
  breathRaw=rawTarget;
  breath+=(rawTarget-breath)*0.052;

  // ── CONVERGENCE ──
  const cTgt=breath>0.50?(breath-0.50)*2.0+swamVal*0.14:swamVal*0.06;
  convergence+=(Math.min(cTgt,0.95)-convergence)*0.026;
  convergence=Math.max(0,convergence-0.004);

  // ── TENSION/RELEASE CYCLE ──
  tensionT++;
  const ph=PHASES[tensionPhase];
  if(tensionT>ph.dur+convergence*ph.dur*0.45){
    tensionPhase=(tensionPhase+1)%PHASES.length;
    tensionT=0;
    if(tensionPhase===4){
      bloomAmt=1.0;
      memoryTraces.push({
        x:W*0.50+noise(T,0,100)*W*0.10,y:H*surferY,
        r:H*0.06,maxR:H*(0.22+Math.random()*0.14),
        alpha:0.32+convergence*0.22,life:1.0,
        decay:0.004+Math.random()*0.003,angle:Math.random()*Math.PI*2,
      });
      if(memoryTraces.length>5)memoryTraces.shift();
    }
  }
  tensionAmt+=(ph.tgt-tensionAmt)*0.022;
  bloomAmt=Math.max(0,bloomAmt-0.016);
  memoryTraces.forEach(m=>{
    m.r=Math.min(m.maxR,m.r+(m.maxR-m.r)*0.014);m.life-=m.decay;
  });
  memoryTraces=memoryTraces.filter(m=>m.life>0);

  // ── COLOR TEMPERATURE ──
  const cTmpTgt=tensionPhase===0?0.05:tensionPhase===1?0.32:tensionPhase===2?0.65:tensionPhase===3?1.0:0.12;
  colorTemp+=(cTmpTgt-colorTemp)*0.016;

  // ── SURFER POSITION ──
  const tY=0.44+(1-breath)*0.09;
  surferY+=(tY-surferY)*0.036;
  const mY=Math.sin(T*0.021)*H*0.013+Math.sin(T*0.040)*H*0.006;
  const mX=Math.sin(T*0.017)*W*0.020+Math.sin(T*0.030)*W*0.008;
  const sx=W*0.50+mX,sy=H*surferY+mY;

  // Wake spawn
  if(Math.random()<0.45+breath*0.35){
    if(wake.length>75)wake.shift();
    wake.push({
      x:sx+(Math.random()-0.5)*H*0.010,y:sy+(Math.random()-0.5)*H*0.007,
      vx:(-0.55-Math.random()*0.75)*breath,vy:(Math.random()-0.5)*0.18,
      life:1.0,decay:0.004+Math.random()*0.004,r:H*(0.005+Math.random()*0.007*breath),
    });
  }
  wake.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;});
  wake=wake.filter(p=>p.life>0);

  // State
  stateEl.textContent=convergence>0.65?'Convergence':convergence>0.30?'Building':breath>0.48?'Committed':'Resting Trim';
  if(bf)bf.style.width=(rawTarget*100).toFixed(1)+'%';

  // ══ RENDER — layered from deep to surface ══
  // 1. Deep ocean body — the water's weight
  drawDeepBody();
  // 2. Subsurface parallax — depth and immersion
  drawSubsurface();
  // 3. Internal light veins — the wave's nervous system
  drawLightVeins();
  // 4. Wave body — four-layer surface
  drawWaveBody();
  // 5. Wake — memory of mass
  drawWake();
  // 6. Ocean memory — pressure echoes
  drawMemory();
  // 7. Trim line — spine of the visitor
  drawTrimLine(sx,sy);
  // 8. Balance filaments — the visitor's gesture
  drawFilaments(sx,sy);
  // 9. Wave markings
  drawMarkings(sx,sy);
  // 10. Crest plumes — pressure filaments
  drawPlumes(sx,sy);
  // 11. Gravity node — center of mass
  drawNode(sx,sy);
  // 12. The lip — the wave's signature, drawn last and highest
  drawLip(sx,sy);
}

render();
</script>

</html>
