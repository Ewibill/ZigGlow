const FRAMES=1313,DUR=224.0,FPS=5.86;

// Decode 8 streams from hex nibbles
// 0=amp_t 1=pitch 2=onset_t 3=bright(inv) 4=amp_i 5=onset_i 6=amp_b 7=onset_b
const streams=Array.from({length:8},()=>new Float32Array(FRAMES));
for(let f=0;f<FRAMES;f++)
  for(let s=0;s<8;s++)
    streams[s][f]=parseInt(HEX[f*8+s],16)/15;
const [amp_t,pitch,onset_t,bright,amp_i,onset_i,amp_b,onset_b]=streams;

const cv=document.getElementById('c');
const ctx=cv.getContext('2d');
const INFO=document.getElementById('info');
const PB=document.getElementById('pb');

function resize(){
  const vw=window.innerWidth,vh=window.innerHeight;
  const ratio=9/16;
  cv.width=vw/vh<ratio?vw:Math.round(vh*ratio);
  cv.height=vw/vh<ratio?Math.round(vw/ratio):vh;
}
resize();
window.addEventListener('resize',resize);
const W=()=>cv.width,H=()=>cv.height,CX=()=>cv.width/2,CY=()=>cv.height/2;

// 12-color chroma palette - A minor / C major
// C=teal dominant, A=amber-red strong, F#=warm gold
const PC=[
  [55,172,155],[38,195,195],[210,148,38],[175,65,28],
  [205,182,45],[115,55,178],[222,158,50],[72,155,72],
  [52,90,198],[195,88,35],[172,52,75],[225,195,128]
];

// Noise function
function sn(x,y,t){
  return Math.sin(x*0.019+t*0.44)*Math.cos(y*0.016-t*0.33)
        +Math.sin(x*0.038-y*0.022+t*0.79)*0.52
        +Math.cos(x*0.012+y*0.029-t*0.43)*0.36;
}

// Water surface wave points
const SURF=80;
const wph=Array.from({length:SURF},()=>Math.random()*Math.PI*2);

function drawSurface(t,amp,bass,raw_ob,pc){
  const w=W(),h=H(),cx=CX();
  const sy=h*0.36;
  const sw=bass*h*0.022+raw_ob*h*0.038;
  // Surface fill - water below
  ctx.beginPath();
  for(let i=0;i<=SURF;i++){
    const x=(i/SURF)*w;
    const ph=(i/SURF)*Math.PI*4;
    const y1=Math.sin(ph+t*0.78+wph[i%wph.length])*sw;
    const y2=Math.sin(ph*2.2+t*1.55)*amp*h*0.007;
    const bx=((t*0.14)%1.2)-0.1;
    const bw=Math.exp(-Math.pow((i/SURF)-bx,2)*16)*bass*h*0.032;
    const y=sy+y1+y2+bw;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.closePath();
  const sg=ctx.createLinearGradient(cx,sy-h*0.03,cx,sy+h*0.07);
  sg.addColorStop(0,`rgba(${pc[0]+18},${pc[1]+18},${pc[2]+18},${0.10+amp*0.07})`);
  sg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=sg;ctx.fill();
  // Surface line
  ctx.beginPath();
  for(let i=0;i<=SURF;i++){
    const x=(i/SURF)*w;
    const ph=(i/SURF)*Math.PI*4;
    const y1=Math.sin(ph+t*0.78+wph[i%wph.length])*sw;
    const y2=Math.sin(ph*2.2+t*1.55)*amp*h*0.007;
    const bx=((t*0.14)%1.2)-0.1;
    const bw=Math.exp(-Math.pow((i/SURF)-bx,2)*16)*bass*h*0.032;
    i===0?ctx.moveTo(x,sy+y1+y2+bw):ctx.lineTo(x,sy+y1+y2+bw);
  }
  ctx.strokeStyle=`rgba(${pc[0]+28},${pc[1]+28},${pc[2]+14},${0.32+amp*0.22})`;
  ctx.lineWidth=1.4;ctx.stroke();
}

function drawDepth(t,amp,bright,bass,pc){
  const w=W(),h=H(),cx=CX();
  // Deep water gradient
  const dg=ctx.createLinearGradient(cx,h*0.36,cx,h);
  dg.addColorStop(0,`rgba(${pc[0]*.38|0},${pc[1]*.48|0},${pc[2]*.68|0},${0.14+bass*0.10})`);
  dg.addColorStop(0.5,`rgba(${pc[0]*.18|0},${pc[1]*.28|0},${pc[2]*.48|0},${0.07+bass*0.05})`);
  dg.addColorStop(1,`rgba(0,0,${pc[2]*.28|0},${0.10+amp*0.07})`);
  ctx.fillStyle=dg;ctx.fillRect(0,h*0.36,w,h*0.64);
  // Submerged light rays - brightness inverse discovery
  if(bright>0.20){
    const bi=(bright-0.20)*0.46;
    const lg=ctx.createRadialGradient(cx,h*0.33,0,cx,h*0.39,w*0.52);
    lg.addColorStop(0,`rgba(${Math.min(255,pc[0]+58)},${Math.min(255,pc[1]+52)},${Math.min(255,pc[2]+38)},${bi})`);
    lg.addColorStop(0.4,`rgba(${Math.min(255,pc[0]+22)},${Math.min(255,pc[1]+20)},${Math.min(255,pc[2]+16)},${bi*0.42})`);
    lg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.arc(cx,h*0.39,w*0.52,0,Math.PI*2);
    ctx.fillStyle=lg;ctx.fill();
    // Light shafts
    for(let r=0;r<6;r++){
      const rx=cx+(r/5-0.5)*w*0.68;
      const ra=bi*(0.28+Math.sin(t*0.38+r*1.1)*0.14);
      const rg=ctx.createLinearGradient(rx,h*0.34,rx,h*0.76);
      rg.addColorStop(0,`rgba(${Math.min(255,pc[0]+38)},${Math.min(255,pc[1]+38)},${Math.min(255,pc[2]+28)},${ra})`);
      rg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.beginPath();
      ctx.moveTo(rx-w*0.014,h*0.34);ctx.lineTo(rx+w*0.014,h*0.34);
      ctx.lineTo(rx+w*0.024,h*0.76);ctx.lineTo(rx-w*0.024,h*0.76);
      ctx.closePath();ctx.fillStyle=rg;ctx.fill();
    }
  }
}

// Fluid trails - bilateral rising bubbles
const trails=Array.from({length:14},(_, i)=>{
  const side=i%2===0?1:-1;
  return {x:0.5+side*(0.10+Math.random()*0.20),y:0.35+Math.random()*0.50,
          vx:(Math.random()-0.5)*0.003,vy:-0.001-Math.random()*0.003,
          life:Math.random(),sz:0.011+Math.random()*0.017,
          side,phase:Math.random()*Math.PI*2};
});

function drawTrails(t,amp,onset,pc){
  const w=W(),h=H(),cx=CX();
  trails.forEach(tr=>{
    tr.vy+=(-0.0007+Math.sin(t*0.28+tr.phase)*0.0004);
    tr.vx+=Math.sin(t*0.48+tr.phase*1.3)*0.0005;
    tr.x+=tr.vx*(0.5+amp*1.4);
    tr.y+=tr.vy*(0.5+amp*1.4);
    tr.life+=0.004+onset*0.011;
    if(tr.y<0.27||tr.life>1||tr.x<0.02||tr.x>0.98){
      tr.x=0.5+tr.side*(0.07+Math.random()*0.16);
      tr.y=0.55+Math.random()*0.32;
      tr.vx=(Math.random()-0.5)*0.002;
      tr.vy=-0.001-Math.random()*0.002;
      tr.life=0;tr.phase=Math.random()*Math.PI*2;
    }
    const px=tr.x*w,py=tr.y*h;
    const sz=Math.max(0.5,tr.sz*w*(0.48+amp*0.75));
    const al=(1-tr.life)*(0.13+amp*0.18);
    ctx.save();ctx.translate(px,py);
    ctx.rotate(Math.atan2(tr.vy,tr.vx));
    ctx.beginPath();ctx.ellipse(0,0,sz*1.7,sz*0.65,0,0,Math.PI*2);
    ctx.strokeStyle=`rgba(${pc[0]+14},${pc[1]+18},${pc[2]+14},${al})`;
    ctx.lineWidth=Math.max(0.3,sz*0.16);ctx.stroke();
    ctx.beginPath();ctx.arc(0,0,sz*0.38,0,Math.PI*2);
    ctx.fillStyle=`rgba(${pc[0]+22},${pc[1]+28},${pc[2]+18},${al*0.48})`;ctx.fill();
    ctx.restore();
  });
}

// Bilateral body - face emerging from water
function drawBilateral(t,amp,bright,pidx,depth){
  const w=W(),h=H(),cx=CX();
  const pc=PC[pidx];
  const fy=h*0.42-amp*h*0.10-bright*h*0.06;
  const fs=0.47+amp*0.09+bright*0.055;
  const dep=Math.max(1,Math.round(1.5+depth*3.5));
  const tint=amp*0.09;
  const sr=155,sg=85,sb=58;
  const forms=[
    {x:0,     y:-0.024,rx:0.035,ry:0.060,rot:0,    bi:false},
    {x:0.049, y:0.038, rx:0.024,ry:0.019,rot:0.2,  bi:true},
    {x:0,     y:0.088, rx:0.082,ry:0.022,rot:0,    bi:false},
    {x:0,     y:0.128, rx:0.067,ry:0.027,rot:0,    bi:false},
    {x:0.107, y:0.018, rx:0.057,ry:0.047,rot:0.27, bi:true},
    {x:0.062, y:-0.080,rx:0.062,ry:0.021,rot:-0.2, bi:true},
    {x:0.067, y:-0.052,rx:0.032,ry:0.024,rot:0,    bi:true},
    {x:0.043, y:0.182, rx:0.040,ry:0.062,rot:0.14, bi:true},
    {x:0.085, y:0.285, rx:0.052,ry:0.084,rot:0.24, bi:true},
  ];
  for(let layer=dep;layer>=0;layer--){
    const ls=fs*(1-layer*0.13);
    const la=(0.09+(dep-layer)*0.10)*(0.44+bright*0.56);
    const ly=fy+layer*h*0.028;
    const pulse=1+Math.sin(t*0.63+layer*0.5)*0.019*amp;
    const wv=Math.sin(t*0.33+layer)*w*0.005*amp;
    const cr=Math.min(255,sr+pc[0]*tint+Math.sin(t*0.25+layer)*6)|0;
    const cg=Math.min(255,sg+pc[1]*tint*0.5)|0;
    const cb=Math.min(255,sb+pc[2]*tint*0.4+layer*2)|0;
    forms.forEach(f=>{
      const isBody=f.y>0.16;
      if(isBody&&layer===0)return;
      const draw=(xs)=>{
        const fx=cx+f.x*w*ls*xs+wv;
        const fy2=ly+f.y*h*ls;
        const rx=Math.max(0.5,f.rx*w*ls*pulse);
        const ry=Math.max(0.5,f.ry*h*ls*pulse);
        ctx.save();ctx.translate(fx,fy2);ctx.rotate(f.rot*xs);
        ctx.beginPath();ctx.ellipse(0,0,rx,ry,0,0,Math.PI*2);
        const g=ctx.createRadialGradient(0,0,0,0,0,Math.max(rx,ry));
        g.addColorStop(0,  `rgba(${cr+12},${cg+5},${cb+3},${la+0.055})`);
        g.addColorStop(0.6,`rgba(${cr},${cg},${cb},${la})`);
        g.addColorStop(1,  `rgba(${cr*.30|0},${cg*.25|0},${cb*.30|0},0)`);
        ctx.fillStyle=g;ctx.fill();ctx.restore();
      };
      f.bi?(draw(1),draw(-1)):draw(1);
    });
  }
  // Foam at water line
  if(amp>0.18){
    const fg2=ctx.createRadialGradient(cx,h*0.365,0,cx,h*0.365,w*(0.10+amp*0.16));
    fg2.addColorStop(0,`rgba(255,255,255,${amp*0.16})`);
    fg2.addColorStop(0.5,`rgba(${Math.min(255,pc[0]+48)},${Math.min(255,pc[1]+48)},${Math.min(255,pc[2]+36)},${amp*0.09})`);
    fg2.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.arc(cx,h*0.365,w*(0.10+amp*0.16),0,Math.PI*2);
    ctx.fillStyle=fg2;ctx.fill();
  }
  // Teal orbs
  const ov=Math.max(0,bright-0.23)*1.9;
  if(ov>0.04){
    const or2=Math.max(0.5,w*0.029*(0.62+bright*0.62));
    const oy=fy-h*0.052*fs;
    const ox=w*0.066*fs;
    [-ox,ox].forEach(x=>{
      const g=ctx.createRadialGradient(cx+x,oy,0,cx+x,oy,or2*2.2);
      g.addColorStop(0,`rgba(55,172,155,${ov*0.75})`);
      g.addColorStop(0.45,`rgba(38,140,118,${ov*0.38})`);
      g.addColorStop(1,'rgba(22,88,72,0)');
      ctx.beginPath();ctx.arc(cx+x,oy,Math.max(0.5,or2*2.2),0,Math.PI*2);
      ctx.fillStyle=g;ctx.fill();
      ctx.beginPath();ctx.arc(cx+x,oy,Math.max(0.5,or2),0,Math.PI*2);
      ctx.fillStyle=`rgba(75,195,168,${ov*0.52})`;ctx.fill();
    });
  }
}

// Wave arrival from bass events
let waveX=-0.2,waveActive=false,waveIntensity=0;
function drawWave(t,raw_ab,raw_ob,pc){
  const w=W(),h=H(),cx=CX();
  if(raw_ob>0.52&&!waveActive){waveActive=true;waveX=-0.12;waveIntensity=raw_ob;}
  if(waveActive){
    waveX+=0.007;
    if(waveX>1.12){waveActive=false;waveX=-0.2;}
    const wx=waveX*w;
    const alpha=waveIntensity*(0.48-Math.abs(waveX-0.5))*0.48;
    if(alpha>0.01){
      const wg=ctx.createRadialGradient(wx,h*0.5,0,wx,h*0.5,w*0.075);
      wg.addColorStop(0,`rgba(${Math.min(255,pc[0]+28)},${Math.min(255,pc[1]+22)},${Math.min(255,pc[2]+12)},${alpha*0.55})`);
      wg.addColorStop(0.6,`rgba(${pc[0]},${pc[1]},${pc[2]},${alpha*0.28})`);
      wg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.beginPath();ctx.ellipse(wx,h*0.5,w*0.075,h*0.42,0,0,Math.PI*2);
      ctx.fillStyle=wg;ctx.fill();
      ctx.beginPath();ctx.moveTo(wx,h*0.12);ctx.lineTo(wx,h*0.88);
      ctx.strokeStyle=`rgba(${Math.min(255,pc[0]+38)},${Math.min(255,pc[1]+32)},${Math.min(255,pc[2]+18)},${alpha*0.45})`;
      ctx.lineWidth=Math.max(0.5,w*0.003);ctx.stroke();
    }
  }
}

// Smoothing
const sm=new Float32Array(8);
let raw_ob=0,raw_ot=0,raw_ab=0;
function getD(idx){
  const i=Math.min(Math.max(0,idx|0),FRAMES-1);
  const k=0.085;
  raw_ob=onset_b[i];raw_ot=onset_t[i];raw_ab=amp_b[i];
  const raw=[amp_t[i],pitch[i],onset_t[i],bright[i],amp_i[i],onset_i[i],amp_b[i],onset_b[i]];
  for(let j=0;j<8;j++) sm[j]+=(raw[j]-sm[j])*k;
  return {at:sm[0],pi:sm[1],ot:sm[2],br:sm[3],ai:sm[4],oi:sm[5],ab:sm[6],ob:sm[7]};
}

let t=0,elapsed=0,last=null;

function draw(ts){
  if(!last)last=ts;
  const dt=Math.min((ts-last)/1000,0.05);
  last=ts;elapsed+=dt;
  const d=getD(elapsed*FPS);
  const pidx=Math.min(11,Math.floor(d.pi*12));
  const pc=PC[pidx];
  const w=W(),h=H(),cx=CX(),cy=CY();

  // Background - deep water darkness
  ctx.fillStyle=`rgba(0,0,0,${0.028+d.ai*0.026})`;
  ctx.fillRect(0,0,w,h);

  // Sky above water - faint ambient
  const sky=ctx.createLinearGradient(cx,0,cx,h*0.33);
  sky.addColorStop(0,`rgba(${pc[0]*.10|0},${pc[1]*.09|0},${pc[2]*.16|0},${0.038+d.ai*0.025})`);
  sky.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=sky;ctx.fillRect(0,0,w,h*0.33);

  // Depth field (behind body)
  drawDepth(t,d.at,d.br,d.ab,pc);

  // Wave arrival (bass events)
  drawWave(t,raw_ab,raw_ob,pc);

  // Fluid trails (bilateral, rising)
  drawTrails(t,d.at,d.oi,pc);

  // Bilateral body - face emerging from water
  drawBilateral(t,d.at,d.br,pidx,d.br*0.82+d.at*0.18);

  // Water surface (in front of body lower half)
  drawSurface(t,d.ai,d.ab,raw_ob,pc);

  // Tenor onset flash at surface
  if(raw_ot>0.58){
    const fv=(raw_ot-0.58)*0.46;
    const fr2=Math.max(1,w*0.024+raw_ot*w*0.058);
    const flash_y=h*0.36;
    const fg=ctx.createRadialGradient(cx,flash_y,0,cx,flash_y,fr2);
    fg.addColorStop(0,`rgba(255,245,218,${fv})`);
    fg.addColorStop(0.5,`rgba(${Math.min(255,pc[0]+42)},${Math.min(255,pc[1]+38)},${Math.min(255,pc[2]+20)},${fv*0.28})`);
    fg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.arc(cx,flash_y,Math.max(1,fr2),0,Math.PI*2);
    ctx.fillStyle=fg;ctx.fill();
  }

  // Vertical helix spiral - body rotating in water
  ctx.beginPath();
  let first=true;
  for(let i=0;i<=240;i++){
    const fr=i/240;
    const ang=fr*Math.PI*8+t*0.95;
    const rad=Math.max(0.1,w*(0.038+fr*0.11)*(0.48+d.at*0.48));
    const px=cx+Math.cos(ang)*rad*(0.58+d.ai*0.38);
    const py=h*(0.71-fr*0.50);
    first?(ctx.moveTo(px,py),first=false):ctx.lineTo(px,py);
  }
  ctx.strokeStyle=`rgba(${pc[0]+20},${pc[1]+14},${pc[2]},${0.055+d.at*0.055})`;
  ctx.lineWidth=1.0;ctx.stroke();

  // Core pulse at surface
  const sy=h*0.358;
  const cR=Math.max(0.1,w*0.0038+Math.sin(t*2.58)*w*0.003+d.at*w*0.010);
  const cg=ctx.createRadialGradient(cx,sy,0,cx,sy,cR+w*0.020);
  cg.addColorStop(0,`rgba(255,246,222,${0.60+d.ot*0.40})`);
  cg.addColorStop(0.4,`rgba(${Math.min(255,pc[0]+30)},${Math.min(255,pc[1]+26)},${Math.min(255,pc[2]+14)},0.20)`);
  cg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();ctx.arc(cx,sy,Math.max(0.5,cR+w*0.020),0,Math.PI*2);
  ctx.fillStyle=cg;ctx.fill();
  ctx.beginPath();ctx.arc(cx,sy,Math.max(0.1,cR),0,Math.PI*2);
  ctx.fillStyle=`rgba(255,244,196,${0.62+Math.sin(t*2.78)*0.38})`;ctx.fill();

  // Progress + loop
  PB.style.width=(Math.min(elapsed/DUR,1)*100)+'%';
  if(elapsed>=DUR){elapsed=0;sm.fill(0);raw_ob=0;raw_ot=0;raw_ab=0;waveActive=false;waveX=-0.2;}
  if(elapsed>5)INFO.classList.add('fade');
  t+=0.016;
  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
</script>
